<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画像切り抜きツール</title>
    <style>
        * { margin: 0; box-sizing: border-box; }
        body { text-align: center; padding: 10px; overflow: hidden; }
        canvas { border: 1px solid #ccc; cursor: crosshair; }
        .controls { margin-top: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .controls button { font-size: 24px; padding: 14px 32px; }
    </style>
</head>
<body>
    <input type="file" id="upload" accept="image/*"><br>
    <canvas id="canvas"></canvas><br>
    <div class="controls">
        <button id="undo">ひとつ戻る</button>
        <button id="save">切り抜いて保存</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('upload');
        let img = new Image();
        let strokes = [];
        let currentStroke = [];
        let drawing = false;

        ctx.lineWidth = 12;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#FF0';

        let blinkOn = true;
        setInterval(() => {
            blinkOn = !blinkOn;
            if (strokes.length > 0 || currentStroke.length > 0) redraw();
        }, 800);

        function fitCanvas() {
            const maxW = window.innerWidth - 30;
            const maxH = window.innerHeight - 100;
            const scaleX = maxW / img.width;
            const scaleY = maxH / img.height;
            const s = Math.min(scaleX, scaleY, 1);
            canvas.style.width = Math.floor(img.width * s) + 'px';
            canvas.style.height = Math.floor(img.height * s) + 'px';
        }

        function getPos(clientX, clientY) {
            const r = canvas.getBoundingClientRect();
            let x = (clientX - r.left) * (canvas.width / r.width);
            let y = (clientY - r.top) * (canvas.height / r.height);
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            return { x, y };
        }

        function drawStroke(stroke) {
            if (stroke.length < 2) return;
            ctx.save();
            ctx.globalAlpha = blinkOn ? 1 : 0.2;
            ctx.beginPath();
            ctx.moveTo(stroke[0].x, stroke[0].y);
            for (let i = 1; i < stroke.length; i++) {
                ctx.lineTo(stroke[i].x, stroke[i].y);
            }
            ctx.stroke();
            ctx.restore();
        }

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            for (const s of strokes) {
                drawStroke(s);
            }
            if (currentStroke.length >= 2) {
                drawStroke(currentStroke);
            }
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    fitCanvas();
                    ctx.lineWidth = 12;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = '#FF0';
                    ctx.drawImage(img, 0, 0);
                    strokes = [];
                    currentStroke = [];
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function addPoints(pts, stroke) {
            if (stroke.length > 0) {
                const last = stroke[stroke.length - 1];
                const dx = pts.x - last.x;
                const dy = pts.y - last.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 4) {
                    const steps = Math.ceil(dist / 3);
                    for (let i = 1; i < steps; i++) {
                        stroke.push({x: last.x + dx * i / steps, y: last.y + dy * i / steps});
                    }
                }
            }
            stroke.push(pts);
            return stroke.length;
        }

        function autoCloseStroke(stroke) {
            if (stroke.length < 3) return;
            const first = stroke[0];
            const last = stroke[stroke.length - 1];
            const dx = first.x - last.x;
            const dy = first.y - last.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 1 && dist < 50) {
                const steps = Math.ceil(dist / 3);
                for (let i = 1; i <= steps; i++) {
                    stroke.push({x: last.x + dx * i / steps, y: last.y + dy * i / steps});
                }
            }
        }

        function autoConnectStrokes() {
            const threshold = 40;
            let merged = true;
            while (merged) {
                merged = false;
                for (let i = 0; i < strokes.length; i++) {
                    for (let j = i + 1; j < strokes.length; j++) {
                        const a = strokes[i];
                        const b = strokes[j];
                        if (a.length < 1 || b.length < 1) continue;
                        const aFirst = a[0];
                        const aLast = a[a.length - 1];
                        const bFirst = b[0];
                        const bLast = b[b.length - 1];

                        const pairs = [
                            { aRev: false, bRev: false, dx: aLast.x - bFirst.x, dy: aLast.y - bFirst.y },
                            { aRev: true, bRev: true, dx: aFirst.x - bLast.x, dy: aFirst.y - bLast.y },
                            { aRev: false, bRev: true, dx: aLast.x - bLast.x, dy: aLast.y - bLast.y },
                            { aRev: true, bRev: false, dx: aFirst.x - bFirst.x, dy: aFirst.y - bFirst.y },
                        ];

                        let best = null;
                        let bestDist = Infinity;
                        for (const p of pairs) {
                            const d = Math.sqrt(p.dx * p.dx + p.dy * p.dy);
                            if (d < threshold && d < bestDist) {
                                bestDist = d;
                                best = p;
                            }
                        }

                        if (best) {
                            const aPts = best.aRev ? [...a].reverse() : [...a];
                            const bPts = best.bRev ? [...b].reverse() : [...b];
                            const lastA = aPts[aPts.length - 1];
                            const firstB = bPts[0];
                            const gapDx = firstB.x - lastA.x;
                            const gapDy = firstB.y - lastA.y;
                            const gapDist = Math.sqrt(gapDx * gapDx + gapDy * gapDy);
                            const steps = Math.ceil(gapDist / 3);
                            for (let k = 1; k < steps; k++) {
                                aPts.push({x: lastA.x + gapDx * k / steps, y: lastA.y + gapDy * k / steps});
                            }
                            strokes[i] = aPts.concat(bPts);
                            strokes.splice(j, 1);
                            merged = true;
                            break;
                    }
                }
                if (merged) break;
                }
            }
        }

        function finishDrawing() {
            if (!drawing) return;
            drawing = false;
            if (currentStroke.length >= 2) {
                autoCloseStroke(currentStroke);
                strokes.push([...currentStroke]);
                currentStroke = [];
                autoConnectStrokes();
                redraw();
            }
        }

        canvas.onmousedown = (e) => {
            drawing = true;
            currentStroke = [];
            const pos = getPos(e.clientX, e.clientY);
            addPoints(pos, currentStroke);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.stroke();
        };

        canvas.onmousemove = (e) => {
            if (!drawing) return;
            const pos = getPos(e.clientX, e.clientY);
            const len = addPoints(pos, currentStroke);
            ctx.lineTo(currentStroke[len - 1].x, currentStroke[len - 1].y);
            ctx.stroke();
        };

        document.addEventListener('mouseup', finishDrawing);

        canvas.ontouchstart = (e) => {
            e.preventDefault();
            drawing = true;
            currentStroke = [];
            const pos = getPos(e.touches[0].clientX, e.touches[0].clientY);
            addPoints(pos, currentStroke);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.stroke();
        };

        canvas.ontouchmove = (e) => {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e.touches[0].clientX, e.touches[0].clientY);
            const len = addPoints(pos, currentStroke);
            ctx.lineTo(currentStroke[len - 1].x, currentStroke[len - 1].y);
            ctx.stroke();
        };

        document.addEventListener('touchend', finishDrawing);
        document.addEventListener('touchcancel', finishDrawing);

        document.getElementById('undo').onclick = () => {
            if (strokes.length === 0) return;
            strokes.pop();
            redraw();
        };

        document.getElementById('save').onclick = () => {
            const allPoints = strokes.flat();
            if (allPoints.length < 3) return;

            const offscreen = document.createElement('canvas');
            offscreen.width = canvas.width;
            offscreen.height = canvas.height;
            const octx = offscreen.getContext('2d');

            octx.beginPath();
            octx.moveTo(allPoints[0].x, allPoints[0].y);
            allPoints.forEach(p => octx.lineTo(p.x, p.y));
            octx.closePath();
            octx.clip();

            octx.drawImage(img, 0, 0);

            const link = document.createElement('a');
            link.download = 'cutout.png';
            link.href = offscreen.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
