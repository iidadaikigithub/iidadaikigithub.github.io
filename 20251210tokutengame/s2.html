<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>てんすうシステム</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: clamp(10px, 2vh, 20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: clamp(16px, 2vw, 24px);
      min-height: 100vh;
      box-sizing: border-box;
      touch-action: manipulation;
    }

    .container {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 200vw;
      gap: clamp(20px, 3vw, 60px);
      flex: 1;
    }

    .party {
      flex: 1;
      text-align: center;
      transition: transform 0.8s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .party img {
      width: 100%;
      max-width: clamp(150px, 25vw, 200px);
      cursor: pointer;
      margin: 0 auto;
    }

    .bar-container {
      height: clamp(300px, 40vh, 400px);
      width: clamp(400px, 12vw, 1000px);
      background: #eee;
      margin: clamp(1px, 2vh, 2px) auto;
      position: relative;
    }

    .bar {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #4CAF50;
      transition: height 0.9s;
    }

    .votes {
      font-size: clamp(80px, 15vw, 600px);
      font-weight: bold;
      line-height: 1;
    }

    button {
      margin-top: clamp(10px, 2vh, 20px);
      font-size: clamp(16px, 2vw, 24px);
      padding: clamp(8px, 1.5vw, 16px) clamp(16px, 3vw, 32px);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: clamp(12px, 2vw, 24px);
      margin-top: clamp(10px, 2vh, 20px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls label {
      font-size: clamp(16px, 2vw, 24px);
      display: flex;
      align-items: center;
      gap: 0.4em;
    }

    .controls input {
      width: clamp(20px, 2vw, 28px);
      height: clamp(20px, 2vw, 28px);
    }

    .party-name {
      font-size: clamp(18px, 3vw, 32px);
      margin-top: clamp(5px, 1vh, 15px);
    }

    .sway-once {
      animation: sway 0.9s ease-in-out 1;
    }

    @keyframes sway {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
      75% { transform: rotate(-1deg); }
      100% { transform: rotate(0deg); }
    }

    .glow {
      box-shadow: 0 0 20px 10px rgba(255, 215, 0, 0.7);
    }
  </style>
</head>
<body>

  <div class="container" id="voteArea">
    <div class="party" id="ao">
      <img src="ao.jpg" alt="青チーム">
      <div class="party-name">ねこチーム</div>
      <div class="bar-container">
        <div class="bar" id="bar-ao" style="height: 0%; background: #3498db;"></div>
      </div>
      <div class="votes" id="votes-ao">0 点</div>
    </div>

    <div class="party" id="aka">
      <img src="aka.jpg" alt="赤チーム">
      <div class="party-name">いぬチーム</div>
      <div class="bar-container">
        <div class="bar" id="bar-aka" style="height: 0%; background: #e74c3c;"></div>
      </div>
      <div class="votes" id="votes-aka">0 点</div>
    </div>
  </div>

  <div class="controls">
    <button onclick="undo()">ひとつ戻る</button>
    <label><input type="checkbox" id="speechToggle" checked> 呼び方変更</label>
  </div>

  <audio id="ao1" src="AO1.MP3" preload="auto"></audio>
  <audio id="aka1" src="AKA1.MP3" preload="auto"></audio>

  <script>
    const votes = { ao: 0, aka: 0 };
    const history = [];
    let previousWinner = null;
    let canAdd = true;
    let audioUnlocked = false;

    const voteArea = document.getElementById('voteArea');
    const speechToggle = document.getElementById('speechToggle');
    const teamNames = {
      ao: 'ねこチーム',
      aka: 'いぬチーム'
    };
    const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/1CULP4Y3jCiTCm5rYvo05iZIjSKCYTlXc61nU9VzUjRA/export?format=csv&gid=0';

    function unlockAudio() {
      audioUnlocked = true;
    }
    document.addEventListener('pointerdown', unlockAudio, { once: true });

    async function loadTeamNames() {
      try {
        const response = await fetch(spreadsheetUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('sheet fetch failed');
        const csv = await response.text();
        const lines = csv.split(/\r?\n/).filter(Boolean);
        if (lines.length >= 2) {
          const leftName = lines[0].split(',')[0].trim();
          const rightName = lines[1].split(',')[0].trim();
          if (leftName) teamNames.ao = leftName;
          if (rightName) teamNames.aka = rightName;
        }
      } catch (e) {
        console.warn('Failed to refresh team names', e);
      }
    }

    function playIntroAudio(party) {
      const audio = document.getElementById(party === 'ao' ? 'ao1' : 'aka1');
      if (!audio) return;
      audio.currentTime = 0;
      audio.play().catch(() => {});
      setTimeout(() => {
        audio.pause();
        audio.currentTime = 0;
      }, 1000);
    }

    async function speakVote(party) {
      await loadTeamNames();
      if (!speechToggle.checked || typeof window.speechSynthesis === 'undefined') return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(`${teamNames[party]}、一点取りました！！`);
      utterance.lang = 'ja-JP';
      window.speechSynthesis.speak(utterance);
    }

    function addVote(party) {
      if (!canAdd) return;

      votes[party]++;
      history.push(party);
      updateDisplay();
      if (speechToggle.checked) {
        playIntroAudio(party);
        setTimeout(() => {
          speakVote(party);
        }, 1100);
      } else {
        const audio = document.getElementById(party === 'ao' ? 'ao1' : 'aka1');
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        }
      }

      canAdd = false;
      setTimeout(() => { canAdd = true; }, 5000);
    }

    voteArea.addEventListener('pointerdown', function(e) {
      if (e.button !== 0) return;

      const rect = voteArea.getBoundingClientRect();
      const party = e.clientX - rect.left < rect.width / 2 ? 'ao' : 'aka';
      addVote(party);
    });

    function undo() {
      const lastVote = history.pop();
      if (lastVote && votes[lastVote] > 0) {
        votes[lastVote]--;
        updateDisplay();
      }
    }

    function updateDisplay() {
      const total = votes.ao + votes.aka || 1;
      const percentAo = (votes.ao / total) * 100;
      const percentAka = (votes.aka / total) * 100;
      document.getElementById('votes-ao').textContent = `${votes.ao} `;
      document.getElementById('votes-aka').textContent = `${votes.aka} `;
      document.getElementById('bar-ao').style.height = percentAo + '%';
      document.getElementById('bar-aka').style.height = percentAka + '%';
      const aoEl = document.getElementById('ao');
      const akaEl = document.getElementById('aka');
      aoEl.classList.remove('glow', 'sway-once');
      akaEl.classList.remove('glow', 'sway-once');
      let currentWinner = null;
      if (votes.ao > votes.aka) currentWinner = 'ao';
      else if (votes.aka > votes.ao) currentWinner = 'aka';
      if (currentWinner) {
        const winnerEl = document.getElementById(currentWinner);
        winnerEl.classList.add('glow');
        if (currentWinner !== previousWinner) {
          winnerEl.classList.add('sway-once');
          setTimeout(() => {
            winnerEl.classList.remove('sway-once');
          }, 700);
        }
      }
      previousWinner = currentWinner;
    }

    loadTeamNames();
    updateDisplay();
  </script>

</body>
</html>
