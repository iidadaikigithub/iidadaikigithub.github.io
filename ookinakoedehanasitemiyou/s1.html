<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>声の大きさメーター</title>

<style>
body {
    background: #000;
    color: white;
    text-align: center;
    font-family: sans-serif;
}

/* 外枠（点滅用） */
#container {
    display: inline-block;
    padding: 30px;
    border: 5px solid #444;
    border-radius: 20px;
}

/* 点滅エフェクト */
.flash {
    animation: flash 0.3s 3;
}

@keyframes flash {
    0% { border-color: white; }
    50% { border-color: red; }
    100% { border-color: white; }
}

#meter {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 400px;
}

.bar {
    width: 18px;
    margin: 3px;
    background: #222;
    transition: background 0.1s;
}

#message {
    font-size: 42px;
    margin-top: 30px;
    opacity: 0;
    transition: opacity 1s;
    font-weight: bold;
}

button {
    font-size: 22px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>声の大きさメーター</h1>

<button onclick="setMode('auto')">自動モード</button>
<button onclick="setMode('manual')">手動モード</button>

<br>
感度（閾値）<input type="range" id="threshold" min="10" max="200" value="50">

<div id="container">
    <div id="meter"></div>
</div>

<div id="message"></div>
<audio id="audio"></audio>

<script>
const meter = document.getElementById("meter");
const message = document.getElementById("message");
const audio = document.getElementById("audio");
const container = document.getElementById("container");

let mode = "manual";
let bars = [];

// メーター作成
for (let i = 1; i <= 20; i++) {
    let bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (i * 15) + "px";
    meter.appendChild(bar);
    bars.push(bar);
}

// 色
function getColor(i) {
    if (i <= 5) return "white";
    if (i <= 14) return "green";
    if (i <= 18) return "yellow";
    return "red";
}

// アニメーション
function animateBars(level) {
    container.classList.add("flash");
    setTimeout(() => container.classList.remove("flash"), 500);

    bars.forEach((bar, i) => {
        setTimeout(() => {
            if (i < level) {
                bar.style.background = getColor(i+1);
            } else {
                bar.style.background = "#222";
            }
        }, i * 40);
    });
}

// メッセージ
function showMessage(text, sound) {
    message.innerText = text;
    message.style.opacity = 1;

    audio.src = sound;
    audio.volume = 0;
    audio.play();

    let v = 0;
    let fade = setInterval(() => {
        v += 0.05;
        audio.volume = v;
        if (v >= 1) clearInterval(fade);
    }, 50);

    setTimeout(() => {
        message.style.opacity = 0;
    }, 4000);
}

// モード
function setMode(m) {
    mode = m;
}

// 手動キー
document.addEventListener("keydown", (e) => {
    if (mode !== "manual") return;

    let key = parseInt(e.key);
    if (isNaN(key)) return;

    let levelMap = [1,3,5,7,9,11,13,15,17,20];
    let level = levelMap[key];

    animateBars(level);

    if (key <= 2) {
        showMessage("もうすこし大きな声で話してみましょう", "siro.mp3");
    } else if (key <= 6) { // ← 3キーをここに含めた
        showMessage("とてもよい声の大きさです！その調子です！", "midori.mp3");
    } else if (key <= 8) {
        showMessage("少し声が大きいです。もう少し小さくしましょう", "ki.mp3");
    } else {
        showMessage("声が大き過ぎます！！少し静かに話してください！！", "aka.mp3");
    }
});

// マイク
async function initMic() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new AudioContext();
    const analyser = ctx.createAnalyser();
    const source = ctx.createMediaStreamSource(stream);

    source.connect(analyser);
    analyser.fftSize = 256;

    const data = new Uint8Array(analyser.frequencyBinCount);

    function loop() {
        if (mode === "auto") {
            analyser.getByteFrequencyData(data);

            let sum = data.reduce((a, b) => a + b, 0);
            let avg = sum / data.length;

            let threshold = document.getElementById("threshold").value;

            let level = Math.min(20, Math.floor(avg / threshold * 20));

            animateBars(level);
        }
        requestAnimationFrame(loop);
    }
    loop();
}

initMic();

</script>

</body>
</html>
