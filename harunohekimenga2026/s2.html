<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>おえかき完全版</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif;}
#container{display:flex;width:100vw;height:100vh;}

#canvasArea{width:80%;position:relative;}
canvas{position:absolute;top:0;left:0;}

#cursor{
    position:absolute;
    border:2px solid white;
    border-radius:50%;
    pointer-events:none;
    mix-blend-mode:difference;
}

#ui{
    width:20%;
    background:#ddd;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    padding:5px;
}

.item{border:2px solid transparent;margin:3px;cursor:pointer;}
.selected{border:2px solid red;}

.color{width:18px;height:18px;border-radius:50%;}
.brush{width:48%;height:40px;object-fit:contain;}
button{width:48%;margin:2px;}

input[type=range]{width:100%;height:40px;}
</style>
</head>
<body>

<div id="container">
<div id="canvasArea">
    <canvas id="bg"></canvas>
    <canvas id="paint"></canvas>
    <div id="cursor"></div>
</div>
<div id="ui"></div>
</div>

<script>
const bg=document.getElementById("bg");
const paint=document.getElementById("paint");
const cursor=document.getElementById("cursor");
const bgCtx=bg.getContext("2d");
const pCtx=paint.getContext("2d");

const w=window.innerWidth*0.8;
const h=window.innerHeight;

[bg,paint].forEach(c=>{c.width=w;c.height=h});

/* ===== 音 ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundOn = true;
let lastSound = 0;

function playSound(){
    if(!soundOn) return;
    const now = Date.now();
    if(now - lastSound < 40) return;
    lastSound = now;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type="triangle";
    osc.frequency.value=400 + Math.random()*800;
    gain.gain.value=0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
}

/* ===== 背景画像 ===== */
function loadImage(src){
    return new Promise(res=>{
        const img=new Image();
        img.onload=()=>res(img);
        img.src=src;
    });
}

let img2Rect={};

(async ()=>{
    const img1=await loadImage("haikei1.png");
    const img2=await loadImage("haikei2.png");

    bgCtx.drawImage(img1,0,0,w,h);

    const scale=1.1;
    const iw=img2.width*scale;
    const ih=img2.height*scale;

    const x=(w-iw)/2;
    const y=(h-ih)/2;

    img2Rect={x,y,w:iw,h:ih};

    bgCtx.drawImage(img2,x,y,iw,ih);
})();

/* ===== 状態 ===== */
let drawing=false;
let brushImg=new Image();
brushImg.src="b1.png";
let size=40;

/* ⭐ 完全一致色 */
let drawColor="rgb(0,180,0)";

/* ===== UI ===== */
const ui=document.getElementById("ui");

function clearSelect(){
    document.querySelectorAll(".selected").forEach(e=>e.classList.remove("selected"));
}

const bases=[
[0,180,0],[0,180,255],[140,80,40],
[255,255,255],[160,0,160],[255,220,0],
[255,0,0],[255,140,0]
];

const bgColor=[221,221,221];

function mixColor(c,a){
    return [
        Math.round(c[0]*a + bgColor[0]*(1-a)),
        Math.round(c[1]*a + bgColor[1]*(1-a)),
        Math.round(c[2]*a + bgColor[2]*(1-a))
    ];
}

/* ⭐ 色パレット */
bases.forEach(c=>{
    for(let i=6;i>=1;i--){
        let a=i/6;

        let d=document.createElement("div");
        d.className="item color";

        let finalColor;

        if(c[0]===255 && c[1]===255 && c[2]===255 && i===6){
            finalColor=[0,0,0];
        }else{
            finalColor=mixColor(c,a);
        }

        d.style.background=`rgb(${finalColor[0]},${finalColor[1]},${finalColor[2]})`;

        d.onclick=()=>{
            clearSelect();
            drawColor=`rgb(${finalColor[0]},${finalColor[1]},${finalColor[2]})`;
            d.classList.add("selected");
        };

        ui.appendChild(d);
    }
});

/* 筆 */
["b1.png","b2.png","b3.png","b4.png"].forEach(b=>{
    let img=document.createElement("img");
    img.src=b;
    img.className="item brush";

    img.onclick=()=>{
        clearSelect();
        brushImg.src=b;
        img.classList.add("selected");
    };

    ui.appendChild(img);
});

/* サイズ */
let slider=document.createElement("input");
slider.type="range";
slider.min=5;
slider.max=200;
slider.value=size;

slider.oninput=()=>{
    size=parseInt(slider.value);
    cursor.style.width=size+"px";
    cursor.style.height=size+"px";
};
ui.appendChild(slider);

/* 音ボタン */
let soundBtn=document.createElement("button");
soundBtn.innerText="音ON";
soundBtn.onclick=()=>{
    soundOn=!soundOn;
    soundBtn.innerText=soundOn?"音ON":"音OFF";
};
ui.appendChild(soundBtn);

/* Undo */
let history=[];
function save(){history.push(pCtx.getImageData(0,0,w,h));}
function undo(){
    if(history.length){
        pCtx.putImageData(history.pop(),0,0);
    }
}
let undoBtn=document.createElement("button");
undoBtn.innerText="取り消し";
undoBtn.onclick=undo;
ui.appendChild(undoBtn);

/* 座標 */
function pos(e){
    const r=paint.getBoundingClientRect();
    return {
        x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
        y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
    };
}

/* 範囲制限 */
function inside(x,y){
    return (
        x-size/2>=img2Rect.x &&
        x+size/2<=img2Rect.x+img2Rect.w &&
        y-size/2>=img2Rect.y &&
        y+size/2<=img2Rect.y+img2Rect.h
    );
}

/* 描画 */
function draw(x,y){
    if(!inside(x,y)) return;

    const temp=document.createElement("canvas");
    temp.width=size;
    temp.height=size;
    const tctx=temp.getContext("2d");

    tctx.drawImage(brushImg,0,0,size,size);
    tctx.globalCompositeOperation="source-atop";
    tctx.fillStyle=drawColor;
    tctx.fillRect(0,0,size,size);

    pCtx.drawImage(temp,x-size/2,y-size/2);

    playSound();
}

/* カーソル */
paint.addEventListener("mousemove",e=>{
    let p=pos(e);
    cursor.style.left=(p.x-size/2)+"px";
    cursor.style.top=(p.y-size/2)+"px";
});

/* イベント */
paint.addEventListener("mousedown",()=>{drawing=true;save();});
paint.addEventListener("mousemove",e=>{
    if(!drawing) return;
    let p=pos(e);
    draw(p.x,p.y);
});
paint.addEventListener("mouseup",()=>drawing=false);

paint.addEventListener("touchstart",()=>{drawing=true;save();});
paint.addEventListener("touchmove",e=>{
    let p=pos(e);
    if(drawing) draw(p.x,p.y);
});
paint.addEventListener("touchend",()=>drawing=false);
</script>

</body>
</html>
