<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>おえかき</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif;}

#container {
    display: flex;
    width: 100vw;
    height: 100vh;
}
#canvasArea {
    width: 80vw;
    position: relative;
    height: 100vh;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
#ui {
    width: 20vw;
    min-width: 180px;
    max-width: 320px;
    height: 100vh;
    background: #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    position: relative;
    z-index: 20;
    overflow-y: auto;
    box-sizing: border-box;
}
.palette {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
}
.item {
    box-sizing: border-box;
}
.selected {
    border: 2px solid red;
}
.color {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    margin: 0;
    cursor: pointer;
}
.brush {
    width: 40px;
    height: 40px;
    margin: 4px;
    object-fit: contain;
}

#cursor{
    position:absolute;
    border:2px solid white;
    border-radius:50%;
    pointer-events:none;
    mix-blend-mode:difference;
}

/* 右メニュー画像配置用 */
.draggable-img {
    width: 50vw;
    max-width: 90vw;
    aspect-ratio: 1/1;
    object-fit: contain;
    touch-action: none;
    position: absolute;
    z-index: 10;
    pointer-events: auto;
    user-select: none;
}
.menu-img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    margin: 6px;
    cursor: grab;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px #aaa;
}
</style>
</head>
<body>

<div id="container">
<div id="canvasArea">
    <canvas id="bg"></canvas>
    <canvas id="paint"></canvas>
    <div id="cursor"></div>
</div>
<div id="ui"></div>
</div>

<script>
const bg=document.getElementById("bg");
const paint=document.getElementById("paint");
const cursor=document.getElementById("cursor");
const bgCtx=bg.getContext("2d");
const pCtx=paint.getContext("2d");

const w=window.innerWidth*0.8;
const h=window.innerHeight;

[bg,paint].forEach(c=>{c.width=w;c.height=h});

/* ===== 音 ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundOn = true;
let lastSound = 0;

function playSound(){
    if(!soundOn) return;
    const now = Date.now();
    if(now - lastSound < 40) return;
    lastSound = now;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type="triangle";
    osc.frequency.value=400 + Math.random()*800;
    gain.gain.value=0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
}

/* ===== 背景画像（totyuu.jpg） ===== */
let img2Rect = { x: 0, y: 0, w: w, h: h };
const bgImg = new Image();
bgImg.onload = () => {
    bgCtx.clearRect(0, 0, w, h);
    bgCtx.drawImage(bgImg, 0, 0, w, h);
};
bgImg.src = "totyuu.jpg";

/* ===== 状態 ===== */
let drawing=false;
let brushImg=new Image();
brushImg.src="b1.png";
let size=40;

/* ⭐ 完全一致色 */
let drawColor="rgb(0,180,0)";

/* ===== UI ===== */
const ui=document.getElementById("ui");

function clearSelect(){
    document.querySelectorAll(".selected").forEach(e=>e.classList.remove("selected"));
}

const bases=[
[0,180,0],[0,180,255],[140,80,40],
[255,255,255],[160,0,160],[255,220,0],
[255,0,0],[255,140,0]
];

const bgColor=[221,221,221];

function mixColor(c,a){
    return [
        Math.round(c[0]*a + bgColor[0]*(1-a)),
        Math.round(c[1]*a + bgColor[1]*(1-a)),
        Math.round(c[2]*a + bgColor[2]*(1-a))
    ];
}

/* ⭐ 色パレット */
const paletteContainer = document.createElement("div");
paletteContainer.className = "palette";
ui.appendChild(paletteContainer);

bases.forEach(c=>{
    for(let i=6;i>=1;i--){
        let a=i/6;

        let d=document.createElement("div");
        d.className="item color";

        let finalColor;

        if(c[0]===255 && c[1]===255 && c[2]===255 && i===6){
            finalColor=[0,0,0];
        }else{
            finalColor=mixColor(c,a);
        }
        d.style.background=`rgb(${finalColor[0]},${finalColor[1]},${finalColor[2]})`;
        d.onclick=()=>{
            clearSelect();
            drawColor=`rgb(${finalColor[0]},${finalColor[1]},${finalColor[2]})`;
            d.classList.add("selected");
        };
        paletteContainer.appendChild(d);
    }
});
// ===== メニュー画像リスト =====
const menuImages = [
    "kusa1.png",
    "kusa2.png",
    "kusa3.png",
    "kusa4.png",
    "kusa5.png",
    "kumo.png"
];

// メニュー画像をUI下部に追加
const menuArea = document.createElement("div");
menuArea.style.width = "100%";
menuArea.style.display = "flex";
menuArea.style.flexWrap = "wrap";
menuArea.style.justifyContent = "center";
menuArea.style.marginTop = "16px";
ui.appendChild(menuArea);

menuImages.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "menu-img";
    img.draggable = false;
    img.addEventListener("pointerdown", e => {
        e.preventDefault();
        createDraggableImg(src, e.clientX, e.clientY);
    });
    menuArea.appendChild(img);
});

// ===== ドラッグ＆ドロップ配置 =====
function createDraggableImg(src, startX, startY) {
    const img = document.createElement("img");
    img.src = src;
    img.className = "draggable-img";
    img.style.width = (w/2) + "px";
    img.style.height = (h/2) + "px";
    img.style.left = (startX - w*0.1) + "px";
    img.style.top = (startY - h*0.1) + "px";
    img.style.position = "absolute";
    img.style.zIndex = 10;
    img.style.pointerEvents = "auto";
    img.style.userSelect = "none";
    document.getElementById("canvasArea").appendChild(img);

    let offsetX = startX - img.getBoundingClientRect().left;
    let offsetY = startY - img.getBoundingClientRect().top;

    function moveAt(x, y) {
        img.style.left = (x - offsetX) + "px";
        img.style.top = (y - offsetY) + "px";
    }

    function onPointerMove(e) {
        moveAt(e.clientX, e.clientY);
    }

    function onPointerUp(e) {
        document.removeEventListener("pointermove", onPointerMove);
        document.removeEventListener("pointerup", onPointerUp);
        img.releasePointerCapture(e.pointerId);
    }

    img.addEventListener("pointerdown", function(e) {
        e.preventDefault();
        offsetX = e.clientX - img.getBoundingClientRect().left;
        offsetY = e.clientY - img.getBoundingClientRect().top;
        document.addEventListener("pointermove", onPointerMove);
        document.addEventListener("pointerup", onPointerUp);
        img.setPointerCapture(e.pointerId);
    });

    // 最初のドラッグ
    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", onPointerUp);
}
["b1.png","b2.png","b3.png","b4.png"].forEach(b=>{
    let img=document.createElement("img");
    img.src=b;
    img.className="item brush";

    img.onclick=()=>{
        clearSelect();
        brushImg.src=b;
        img.classList.add("selected");
    };

    ui.appendChild(img);
});

/* サイズ */
let slider=document.createElement("input");
slider.type="range";
slider.min=5;
slider.max=200;
slider.value=size;

slider.oninput=()=>{
    size=parseInt(slider.value);
    cursor.style.width=size+"px";
    cursor.style.height=size+"px";
};
ui.appendChild(slider);

/* 音ボタン */
let soundBtn=document.createElement("button");
soundBtn.innerText="音ON";
soundBtn.onclick=()=>{
    soundOn=!soundOn;
    soundBtn.innerText=soundOn?"音ON":"音OFF";
};
ui.appendChild(soundBtn);

/* Undo */
let history=[];
function save(){history.push(pCtx.getImageData(0,0,w,h));}
function undo(){
    if(history.length){
        pCtx.putImageData(history.pop(),0,0);
    }
}
let undoBtn=document.createElement("button");
undoBtn.innerText="取り消し";
undoBtn.onclick=undo;
ui.appendChild(undoBtn);

/* 座標 */
function pos(e){
    const r=paint.getBoundingClientRect();
    return {
        x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
        y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
    };
}

/* 範囲制限 */
function inside(x,y){
    return (
        x-size/2>=img2Rect.x &&
        x+size/2<=img2Rect.x+img2Rect.w &&
        y-size/2>=img2Rect.y &&
        y+size/2<=img2Rect.y+img2Rect.h
    );
}

/* 描画 */
function draw(x,y){
    if(!inside(x,y)) return;

    const temp=document.createElement("canvas");
    temp.width=size;
    temp.height=size;
    const tctx=temp.getContext("2d");

    tctx.drawImage(brushImg,0,0,size,size);
    tctx.globalCompositeOperation="source-atop";
    tctx.fillStyle=drawColor;
    tctx.fillRect(0,0,size,size);

    pCtx.drawImage(temp,x-size/2,y-size/2);

    playSound();
}

/* カーソル */
paint.addEventListener("mousemove",e=>{
    let p=pos(e);
    cursor.style.left=(p.x-size/2)+"px";
    cursor.style.top=(p.y-size/2)+"px";
});

/* イベント */
paint.addEventListener("mousedown",()=>{drawing=true;save();});
paint.addEventListener("mousemove",e=>{
    if(!drawing) return;
    let p=pos(e);
    draw(p.x,p.y);
});
paint.addEventListener("mouseup",()=>drawing=false);

paint.addEventListener("touchstart",()=>{drawing=true;save();});
paint.addEventListener("touchmove",e=>{
    let p=pos(e);
    if(drawing) draw(p.x,p.y);
});
paint.addEventListener("touchend",()=>drawing=false);
</script>

</body>
</html>
