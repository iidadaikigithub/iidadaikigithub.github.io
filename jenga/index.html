<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D ジェンガ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ゲームオーバー表示 -->
    <div id="gameOver">
        <div id="gameOverContent">
            <h1>ゲームオーバー</h1>
            <p>タワーが崩れてしまいました…</p>
            <button id="restartBtn">もう一度プレイ</button>
        </div>
    </div>

    <!-- 視点回転ボタン -->
    <button id="btnRotateLeft" class="rotate-btn rotate-left" aria-label="左に回転">◀</button>
    <button id="btnRotateRight" class="rotate-btn rotate-right" aria-label="右に回転">▶</button>

    <!-- リセットボタン（右上） -->
    <button id="restartBtnCorner">リセット</button>

    <!-- 引き抜きモード選択 -->
    <div id="pullModeButtons">
        <button id="btnModeSide" class="mode-btn active">横から取る</button>
        <button id="btnModeFront" class="mode-btn">引き抜いて取る</button>
    </div>

    <!-- 操作説明 -->
    <div id="instructions">
        <p>左クリック押しっぱなしで引き抜き | ↑↓ で選択</p>
        <p>A/D または ◀▶ で視点回転 | ホイールでズーム</p>
    </div>

    <!-- 選択ブロック情報 -->
    <div id="blockInfo">
        選択中: <span id="selectedBlock">1 / 54</span>
    </div>

    <!-- ブロック数 -->
    <div id="blockCount">
        残り: <span id="remainingBlocks">54</span>
    </div>

    <!-- Three.js / Rapier.js の CDN Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.12.0/rapier.es.js"
        }
    }
    </script>

    <!-- メインスクリプト -->
    <script type="module" src="main.js"></script>
</body>
</html>
