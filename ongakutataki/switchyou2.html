<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>音楽たたき 対戦モード</title>
<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow:hidden;
}

#playerSelectOverlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}
#playerSelectContent{
  background:#1a1a2e;
  padding:50px 70px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 0 60px rgba(255,255,255,0.1);
}
#playerSelectContent h1{
  font-size:36px;
  margin-bottom:40px;
  color:gold;
}
#playerCountOptions{
  display:flex;
  gap:20px;
  justify-content:center;
}
#playerCountOptions button{
  padding:20px 40px;
  font-size:28px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  background:#e94560;
  color:white;
  transition:transform 0.2s, background 0.2s;
}
#playerCountOptions button:hover{
  transform:scale(1.1);
  background:#ff6b81;
}

#controls{
  position:static;
  margin: 10px auto 0 auto;
  background:#111;
  padding:8px 16px;
  border-radius:10px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
  z-index:100;
  max-width: 1000px;
  gap:4px;
}
#controls select, #controls button{
  font-size:14px;
  padding:5px 8px;
  margin:2px;
  cursor:pointer;
}

#gameArea{
  position:relative;
  width:100%;
  height:460px;
  overflow:hidden;
  background:#111;
  margin-top:0;
}

#judgeLine{
  position:absolute;
  left:20%;
  top:0;
  width:6px;
  height:100%;
  background:red;
  box-shadow:0 0 20px red;
  transition:all 0.3s;
}
#judgeLine.flash{
  background:yellow !important;
  box-shadow:0 0 80px 20px yellow !important;
}

.note{
  position:absolute;
  top:50%;
  transform:translateY(-50%) scale(1);
  width:400px;
  pointer-events:none;
  transition:transform 0.08s ease-out, opacity 0.3s, left 0.08s linear;
  z-index:10;
}

#seekContainer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#222;
  padding:20px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:200;
}

#seekBarWrapper{
  position:relative;
  width:90%;
  display:flex;
  align-items:center;
}

#timeDisplay{
  font-size:14px;
  margin-right:10px;
  width:80px;
  text-align:left;
}

#seekNumbers{
  position:absolute;
  top:-18px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:#fff;
}

#seekBar{
  width:100%;
  height:14px;
  background:#555;
  cursor:pointer;
  border-radius:8px;
  position:relative;
}
#seekProgress{
  height:100%;
  background:lime;
  width:0%;
  border-radius:8px;
  transition:width 0.1s linear;
}

#loadingOverlay{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  color:white;
  font-size:32px;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:300;
}

#playersHud{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:8px 16px;
  background:rgba(0,0,0,0.8);
  border-top:2px solid #333;
  position:relative;
  z-index:5000;
  min-height:60px;
}
.playerHud{
  flex:1;
  max-width:240px;
  min-width:120px;
  padding:6px 10px;
  border-radius:10px;
  border:2px solid #444;
  text-align:left;
  font-size:13px;
  position:relative;
}
.playerHud .pName{
  font-weight:bold;
  font-size:16px;
  margin-bottom:2px;
}
.playerHud .pStats{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  font-size:12px;
}
.playerHud .pStats span{
  white-space:nowrap;
}
.playerHud .pCombo{
  font-size:52px;
  font-weight:bold;
  text-align:center;
  position:absolute;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  transition:opacity 0.2s;
  text-shadow:0 0 20px currentColor, 0 0 40px currentColor, 0 0 60px currentColor;
  pointer-events:none;
  white-space:nowrap;
  animation:comboGlow 0.4s ease-in-out infinite alternate;
}

@keyframes comboGlow{
  from{ text-shadow:0 0 20px currentColor, 0 0 40px currentColor; }
  to{ text-shadow:0 0 40px currentColor, 0 0 80px currentColor, 0 0 120px currentColor; }
}

@keyframes screenShake{
  0%{ transform:translate(0,0) }
  10%{ transform:translate(-6px,4px) }
  20%{ transform:translate(4px,-6px) }
  30%{ transform:translate(-4px,6px) }
  40%{ transform:translate(6px,-4px) }
  50%{ transform:translate(-6px,4px) }
  60%{ transform:translate(4px,-6px) }
  70%{ transform:translate(-4px,6px) }
  80%{ transform:translate(6px,-4px) }
  90%{ transform:translate(-6px,4px) }
  to{ transform:translate(0,0) }
}

.shake{
  animation:screenShake 0.3s ease-out;
}

#resultOverlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10000;
}
#resultContent{
  background:#1a1a2e;
  padding:40px 60px;
  border-radius:24px;
  text-align:center;
  max-width:800px;
  width:90%;
  box-shadow:0 0 60px rgba(255,255,255,0.1);
  max-height:90vh;
  overflow-y:auto;
}
#resultContent h2{
  font-size:40px;
  margin:0 0 20px 0;
  color:gold;
  text-shadow:0 0 30px rgba(255,215,0,0.3);
}
#resultContent h3.pRank{
  font-size:28px;
  margin:16px 0 8px 0;
}
#resultContent .rPlayerBox{
  padding:12px 20px;
  margin:8px 0;
  border-radius:12px;
  border:2px solid #444;
  text-align:left;
}
#resultContent .rPlayerBox .rName{
  font-size:20px;
  font-weight:bold;
  margin-bottom:4px;
}
#resultContent .rPlayerBox .rStats{
  display:flex;
  gap:12px;
  font-size:16px;
  flex-wrap:wrap;
}
#resultContent button{
  margin-top:24px;
  padding:12px 40px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#e94560;
  color:white;
  cursor:pointer;
  transition:background 0.2s;
}
#resultContent button:hover{
  background:#ff6b81;
}

.score-perfect{ color:gold; }
.score-great{ color:lime; }
.score-ok{ color:#4fc3f7; }
.score-miss{ color:#ff4444; }
</style>

<script type="module">
function changeLineColor(color){
  const judgeLine = document.getElementById("judgeLine");
  judgeLine.style.background = color;
  judgeLine.style.boxShadow = `0 0 20px ${color}`;
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUSdYGkhd7yQXLdxuI6seeg1IF1K2YR4o",
  authDomain: "ongakutataki.firebaseapp.com",
  projectId: "ongakutataki",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const baseMusicURL = "https://iidadaikigithub.github.io/ongakutataki/";
const baseSoundURL = "https://iidadaikigithub.github.io/ongakutataki/sounds/";
const baseIconURL  = "https://iidadaikigithub.github.io/ongakutataki/icons/";

const songs = [
  {file:"music/01.mp3",name:"青い珊瑚礁"},
  {file:"music/02.mp3",name:"ポニーテールとシュシュ"},
  {file:"music/03.mp3",name:"ジッタリン・ジン _ 夏祭り"},
  {file:"music/04.mp3",name:"青と夏"},
  {file:"music/05.mp3",name:"マリーゴールド"},
  {file:"music/06.mp3",name:"BLUE BIRD"},
  {file:"music/07.mp3",name:"波乗りジョニー"},
  {file:"music/08.mp3",name:"エブリデイカチューシャ"},
  {file:"歩いて帰ろう.mp3",name:"歩いて帰ろう"},
  {file:"塔の上のラプンツェル.mp3",name:"塔の上のラプンツェル"},
  {file:"きらきらポン.mp3",name:"きらきらポン"},
  {file:"usa.mp3",name:"USA"},
  {file:"ゆうき.mp3",name:"ゆうき"}
];

const soundNames = [
  "mara","naruko","suzu","tan","tc","tr","wb",
  "red","orange","yellow","green","blue","indigo","purple"
];
const soundCache = {};

let audio = null;
let hitsData = [];
let animationId = null;
let playerCount = 0;
let players = [];

const playerColors = ["#FF4757","#3742FA","#2ED573","#FFA502"];
const playerColorNames = ["#ff4757","#3742fa","#2ed573","#ffa502"];

function createPlayers(count){
  players = [];
  for(let i=0;i<count;i++){
    players.push({
      index:i,
      name:`${i+1}P`,
      score:{perfect:0,great:0,ok:0,miss:0},
      combo:0,
      maxCombo:0,
      color:playerColors[i],
      colorName:playerColorNames[i],
      hitNoteIds:new Set()
    });
  }
}

async function preloadSounds(){
  const loading = document.getElementById("loadingOverlay");
  loading.style.display = "flex";
  for(let i=0;i<soundNames.length;i++){
    const name=soundNames[i];
    const snd=new Audio(baseSoundURL+name+".mp3");
    snd.preload="auto";
    snd.load();
    soundCache[name]=snd;
    loading.textContent=`音声読み込み中 ${i+1}/${soundNames.length}`;
  }
  loading.style.display="none";
}

function playSound(name){
  const snd=soundCache[name];
  if(!snd)return;
  const clone=snd.cloneNode(true);
  clone.currentTime=0;
  clone.volume=1.0;
  clone.play();
}

async function loadSongs(){
  const loading = document.getElementById("loadingOverlay");
  loading.style.display = "flex";
  loading.textContent = "ロード中…";

  const select = document.getElementById("songSelect");
  select.innerHTML = "";
  songs.forEach(song=>{
    const option = document.createElement("option");
    option.value = song.file;
    option.textContent = song.name;
    select.appendChild(option);
  });

  loading.textContent = "ロード完了";
  setTimeout(()=>{ loading.style.display="none"; }, 500);
}

function setPlayerCount(n){
  playerCount = n;
  createPlayers(n);
  document.getElementById("playerSelectOverlay").style.display = "none";
  renderPlayersHud();
}

function renderPlayersHud(){
  const container = document.getElementById("playersHud");
  container.innerHTML = "";
  players.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className = "playerHud";
    div.id = "playerHud"+i;
    div.style.borderColor = p.color;
    div.innerHTML = `
      <div class="pName" style="color:${p.color}">${p.name}</div>
      <div class="pStats">
        <span class="score-perfect">P:0</span>
        <span class="score-great">G:0</span>
        <span class="score-ok">O:0</span>
        <span class="score-miss">M:0</span>
      </div>
      <div class="pCombo" id="pCombo${i}" style="color:${p.color}"></div>
    `;
    container.appendChild(div);
  });
}

async function startGame(){
  if(playerCount === 0){
    alert("先にプレイヤー人数を選んでください");
    return;
  }

  resetGame();

  const selectedSong = document.getElementById("songSelect").value;
  const tempo = parseFloat(document.getElementById("tempoSelect").value);

  const snapshot = await getDocs(collection(db,"hits"));
  hitsData = [];
  snapshot.forEach(doc=>{
    const data = doc.data();
    if(data.song === selectedSong){
      hitsData.push({...data, rendered:false, element:null, judged:false});
    }
  });

  if(hitsData.length === 0){
    alert("この曲のデータがありません。先に録音してください。");
    return;
  }

  const loading = document.getElementById("loadingOverlay");
  loading.style.display = "flex";
  loading.textContent = "ロード中…";

  audio = new Audio(baseMusicURL + selectedSong);
  audio.playbackRate = tempo;

  audio.addEventListener('canplaythrough', ()=>{
    loading.style.display = "none";
    audio.play();
    animate();
    renderSeekNumbers();
  });
}

function animate(){
  const judgeLine = document.getElementById("judgeLine");
  const judgeX = window.innerWidth * 0.2;
  const timeDisplay = document.getElementById("timeDisplay");
  const missChecked = new Set();
  const missTimers = {};

  hitsData.forEach((hit,i)=>{
    missTimers[i] = false;
  });

  function frame(){
    if(!audio) return;

    if(audio.ended || (audio.duration && audio.currentTime >= audio.duration)){
      cancelAnimationFrame(animationId);
      animationId = null;
      showResults();
      return;
    }

    const currentTime = audio.currentTime;

    if(!isNaN(audio.duration)){
      const total = audio.duration;
      const cur = Math.floor(currentTime);
      const tot = Math.floor(total);
      timeDisplay.textContent = `${cur}s / ${tot}s`;

      const progressPercent = Math.min(100, (currentTime/total)*100);
      document.getElementById("seekProgress").style.width = progressPercent + "%";
    }

    hitsData.forEach((hit,i)=>{
      const diff = hit.time - currentTime;
      const lookAhead = 5;

      if(diff < lookAhead && !hit.rendered){
        const img = document.createElement("img");
        img.src = baseIconURL + hit.type + ".png";
        img.className = "note";
        img.style.left = (window.innerWidth + 50) + "px";
        document.getElementById("gameArea").appendChild(img);
        hit.element = img;
        hit.rendered = true;
      }

      if(hit.element){
        const totalWidth = window.innerWidth - judgeX;
        const x = (diff / lookAhead) * totalWidth;
        const noteHalfWidth = 200;
        hit.element.style.left = (judgeX + x - noteHalfWidth) + "px";
        hit.element.style.zIndex = Math.floor(1000 - diff*100);
      }

      if(diff < -5 && hit.element && hit.element.parentNode){
        hit.element.remove();
        hit.element = null;
      }
    });

    animationId = requestAnimationFrame(frame);
  }

  frame();
}

function findClosestNote(currentTime, playerIdx){
  let closest = null;
  let minDiff = Infinity;
  const pHitIds = players[playerIdx].hitNoteIds;

  hitsData.forEach((hit,i) => {
    if(pHitIds.has(i)) return;
    const diff = Math.abs(hit.time - currentTime);
    if(diff < minDiff){
      minDiff = diff;
      closest = hit;
      closest._index = i;
    }
  });

  return { hit: closest, diff: minDiff };
}

function createShatterEffect(x, y, color){
  const gameArea = document.getElementById("gameArea");

  const brightColors = [color,"#fff","#ff0","#f0f","#0ff"];

  for(let i=0;i<55;i++){
    const piece = document.createElement("div");
    const size = 4 + Math.random()*12;
    const c = brightColors[Math.floor(Math.random()*brightColors.length)];
    piece.style.cssText = `
      position:absolute; width:${size}px; height:${size}px;
      background:${c}; left:${x}px; top:${y}px;
      pointer-events:none; z-index:5000;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      box-shadow:0 0 6px ${c};
    `;
    gameArea.appendChild(piece);

    const angle = Math.random()*2*Math.PI;
    const speed = 200 + Math.random()*500;
    const dx = Math.cos(angle)*speed;
    const dy = Math.sin(angle)*speed;

    piece.animate([
      { transform:'translate(0,0) rotate(0deg) scale(1)', opacity:1 },
      { transform:`translate(${dx}px,${dy}px) rotate(${Math.random()*720}deg) scale(0)`, opacity:0 }
    ], { duration:400+Math.random()*300, easing:'ease-out', fill:'forwards' });

    setTimeout(()=>piece.remove(), 900);
  }

  const stars = 8;
  for(let i=0;i<stars;i++){
    const star = document.createElement("div");
    const sz = 6+Math.random()*10;
    star.textContent = "✦";
    star.style.cssText = `
      position:absolute; font-size:${sz}px; color:#fff;
      left:${x}px; top:${y}px; pointer-events:none; z-index:5001;
      text-shadow:0 0 10px ${color}, 0 0 20px ${color};
    `;
    gameArea.appendChild(star);
    const angle = Math.random()*2*Math.PI;
    const dist = 100+Math.random()*200;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    star.animate([
      { transform:'translate(0,0) scale(1) rotate(0deg)', opacity:1 },
      { transform:`translate(${dx}px,${dy}px) scale(0) rotate(${Math.random()>0.5?360:-360}deg)`, opacity:0 }
    ], { duration:500+Math.random()*300, easing:'ease-out', fill:'forwards' });
    setTimeout(()=>star.remove(), 1000);
  }

  const ga = document.getElementById("gameArea");
  ga.classList.remove("shake");
  void ga.offsetWidth;
  ga.classList.add("shake");
}

function hitNote(hit, playerIdx){
  const player = players[playerIdx];

  if(!hit.judged){
    hit.judged = true;
    playSound(hit.type);
  }

  const judgeLine = document.getElementById("judgeLine");
  judgeLine.style.background = player.color;
  judgeLine.style.boxShadow = `0 0 20px ${player.color}`;
  judgeLine.classList.add("flash");
  setTimeout(() => {
    judgeLine.classList.remove("flash");
    const colorSelect = document.getElementById("lineColorSelect");
    judgeLine.style.background = colorSelect.value;
    judgeLine.style.boxShadow = `0 0 20px ${colorSelect.value}`;
  }, 200);

  if(hit.element){
    const rect = hit.element.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    createShatterEffect(cx, cy, player.color);
  }
}

function showJudgment(level, playerIdx){
  const player = players[playerIdx];

  if(level === "perfect"){
    player.score.perfect++;
    player.combo++;
    player.maxCombo = Math.max(player.maxCombo, player.combo);
  } else if(level === "great"){
    player.score.great++;
    player.combo++;
    player.maxCombo = Math.max(player.maxCombo, player.combo);
  } else if(level === "ok"){
    player.score.ok++;
    player.combo++;
    player.maxCombo = Math.max(player.maxCombo, player.combo);
  } else {
    player.score.miss++;
    player.combo = 0;
  }

  updateScoreDisplay(playerIdx);
}

function updateScoreDisplay(playerIdx){
  const p = players[playerIdx];
  const hud = document.getElementById("playerHud"+playerIdx);
  if(!hud)return;
  const stats = hud.querySelector(".pStats");
  stats.innerHTML = `
    <span class="score-perfect">P:${p.score.perfect}</span>
    <span class="score-great">G:${p.score.great}</span>
    <span class="score-ok">O:${p.score.ok}</span>
    <span class="score-miss">M:${p.score.miss}</span>
  `;

  const comboEl = document.getElementById("pCombo"+playerIdx);
  if(p.combo >= 2){
    comboEl.textContent = `${p.combo} Combo!`;
    comboEl.style.opacity = 1;
  } else {
    comboEl.style.opacity = 0;
  }
}

function judge(playerIdx){
  if(!audio) return;
  if(playerIdx >= playerCount) return;

  const currentTime = audio.currentTime;
  const { hit, diff } = findClosestNote(currentTime, playerIdx);

  if(!hit || diff > 0.3){
    showJudgment("miss", playerIdx);
    return;
  }

  let level;
  if(diff <= 0.05) level = "perfect";
  else if(diff <= 0.12) level = "great";
  else if(diff <= 0.25) level = "ok";
  else { showJudgment("miss", playerIdx); return; }

  showJudgment(level, playerIdx);
  players[playerIdx].hitNoteIds.add(hit._index);
  hitNote(hit, playerIdx);
}

function seekTo(time){
  if(audio && !isNaN(audio.duration)){
    audio.currentTime = time;

    document.querySelectorAll(".note").forEach(n=>n.remove());
    hitsData.forEach(h=>{
      h.judged=false;
      h.element=null;
      h.rendered=false;
    });
    players.forEach(p=>{ p.hitNoteIds=new Set(); p.combo=0; });
    players.forEach(p=>updateScoreDisplay(p.index));
  }
}

function renderSeekNumbers(){
  const numbersDiv = document.getElementById("seekNumbers");
  numbersDiv.innerHTML = "";
  if(!audio || isNaN(audio.duration)) return;

  const duration = Math.floor(audio.duration);
  const interval = 20;

  for(let t=0; t<=duration; t+=interval){
    const span = document.createElement("span");
    span.textContent = t;
    numbersDiv.appendChild(span);
  }

  if(duration % interval !== 0){
    const span = document.createElement("span");
    span.textContent = duration;
    numbersDiv.appendChild(span);
  }
}

function resetGame(){
  if(animationId){
    cancelAnimationFrame(animationId);
    animationId = null;
  }

  if(audio){
    audio.pause();
    audio = null;
  }

  document.querySelectorAll(".note").forEach(n=>n.remove());
  document.getElementById("seekProgress").style.width = "0%";
  document.getElementById("resultOverlay").style.display = "none";

  hitsData.forEach(h=>{
    h.judged=false;
    h.element=null;
    h.rendered=false;
  });

  players.forEach(p=>{ p.hitNoteIds=new Set(); p.combo=0; });
}

function showResults(){
  const container = document.getElementById("resultPlayers");
  container.innerHTML = "";

  const sorted = [...players].sort((a,b)=>{
    const scoreA = a.score.perfect*100 + a.score.great*50 + a.score.ok*10;
    const scoreB = b.score.perfect*100 + b.score.great*50 + b.score.ok*10;
    return scoreB - scoreA;
  });

  const rankLabels = ["🥇","🥈","🥉","4位"];

  sorted.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className = "rPlayerBox";
    div.style.borderColor = p.color;
    const total = p.score.perfect + p.score.great + p.score.ok + p.score.miss;
    div.innerHTML = `
      <div class="rName" style="color:${p.color}">
        ${rankLabels[i]||''} ${p.name}
      </div>
      <div class="rStats">
        <span class="score-perfect">Perfect: ${p.score.perfect}</span>
        <span class="score-great">Great: ${p.score.great}</span>
        <span class="score-ok">OK: ${p.score.ok}</span>
        <span class="score-miss">Miss: ${p.score.miss}</span>
        <span style="color:#fff">Max Combo: ${p.maxCombo}</span>
      </div>
    `;
    container.appendChild(div);
  });

  document.getElementById("resultOverlay").style.display = "flex";
}

function closeResults(){
  document.getElementById("resultOverlay").style.display = "none";
}

function backToPlayerSelect(){
  resetGame();
  document.getElementById("playerSelectOverlay").style.display = "flex";
}

window.onload = async ()=>{
  await preloadSounds();
  loadSongs();
};
window.setPlayerCount = setPlayerCount;
window.startGame = startGame;
window.resetGame = resetGame;
window.seekTo = seekTo;
window.changeLineColor = changeLineColor;
window.backToPlayerSelect = backToPlayerSelect;

document.addEventListener('DOMContentLoaded', ()=>{
  const seekBar = document.getElementById("seekBar");
  seekBar.addEventListener('click', function(e){
    if(audio && !isNaN(audio.duration)){
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const t = x / rect.width * audio.duration;
      seekTo(t);
    }
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'a' || e.key === 'A' || e.key === 'b' || e.key === 'B'){
      if(playerCount >= 3){
        e.preventDefault();
        judge(2);
      }
    }
  });

  document.addEventListener('mousedown', (e) => {
    if(e.target.closest('button, select, a, input, textarea, #playerSelectOverlay')) return;
    if(e.button === 0){
      e.preventDefault();
      judge(0);
    } else if(e.button === 2){
      e.preventDefault();
      if(playerCount >= 2) judge(1);
    } else if(e.button === 1){
      e.preventDefault();
      if(playerCount >= 4) judge(3);
    }
  });

  document.addEventListener('contextmenu', (e) => {
    if(e.target.closest('button, select, a, input, textarea')) return;
    e.preventDefault();
  });

  document.addEventListener('auxclick', (e) => {
    if(e.target.closest('button, select, a, input, textarea, #playerSelectOverlay')) return;
    if(e.button === 1){
      e.preventDefault();
    }
  });
});
</script>
</head>
<body>

<div id="playerSelectOverlay">
  <div id="playerSelectContent">
    <h1>何人で遊びますか？</h1>
    <div id="playerCountOptions">
      <button onclick="setPlayerCount(1)">1人</button>
      <button onclick="setPlayerCount(2)">2人</button>
      <button onclick="setPlayerCount(3)">3人</button>
      <button onclick="setPlayerCount(4)">4人</button>
    </div>
  </div>
</div>

<div id="gameArea">
  <div id="judgeLine"></div>
</div>

<div id="playersHud"></div>

<div id="seekContainer">
  <div id="seekBarWrapper">
    <div id="timeDisplay">0s / 0s</div>
    <div style="flex:1; position:relative;">
      <div id="seekNumbers"></div>
      <div id="seekBar">
        <div id="seekProgress"></div>
      </div>
    </div>
  </div>
</div>

<div id="controls">
  曲：
  <select id="songSelect"></select>

  テンポ：
  <select id="tempoSelect">
    <option value="1">等倍</option>
    <option value="0.9">0.9倍</option>
    <option value="0.8">0.8倍</option>
    <option value="0.7">0.7倍</option>
    <option value="0.5">0.5倍</option>
  </select>

  ライン色：
  <select id="lineColorSelect" onchange="changeLineColor(this.value)">
    <option value="red">赤</option>
    <option value="white">白</option>
    <option value="yellow">黄色</option>
    <option value="blue">青</option>
    <option value="lime">緑</option>
  </select>

  <button onclick="startGame()">合奏スタート</button>
  <button onclick="resetGame()">最初からやり直し</button>
  <button onclick="backToPlayerSelect()">人数変更</button>
  <a href="switchyou2settei.html"><button>設定用</button></a>
</div>

<div id="loadingOverlay"></div>

<div id="resultOverlay">
  <div id="resultContent">
    <h2>結果</h2>
    <div id="resultPlayers"></div>
    <button onclick="resetGame()">もう一度プレイ</button>
  </div>
</div>

</body>
</html>
