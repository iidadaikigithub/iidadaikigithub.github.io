<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>音の出るおもちゃ　2026</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

.grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:12px;
    padding:12px;
}

.item{
    border:4px solid transparent;
    transition:0.2s;
}
.item img{
    width:100%;
}

.red{ border-color:red; }
.blue{ border-color:blue; }

.active{ transform:scale(0.96); }

.playing{
    animation:pulse 2.5s ease-in-out infinite;
    border-color:yellow !important;
}

@keyframes pulse{
    0%{ transform:scale(1); box-shadow:0 0 8px yellow; }
    50%{ transform:scale(1.15); box-shadow:0 0 30px yellow; }
    100%{ transform:scale(1); box-shadow:0 0 8px yellow; }
}

.dual{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    width:100vw;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
}
.dual img{
    width:45%;
    height:90%;
    object-fit:contain;
}

video{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:90%;
    max-height:90%;
    display:none;
    z-index:10;
}

button{
    position:fixed;
    bottom:10px;
    left:10px;
    font-size:20px;
    padding:10px;
}
#stopBtn{
    left:auto;
    right:10px;
    display:none;
}
</style>
</head>

<body>

<div id="main" class="grid"></div>

<button id="backBtn">もどる</button>
<button id="stopBtn">やめる</button>

<audio id="audio"></audio>
<video id="video" controls></video>

<script>

const files = [
"01","02","03","04","05","06","07",
"08","09","10","11","12","13","14",
"erabu"
];

const main = document.getElementById("main");
const audio = document.getElementById("audio");
const video = document.getElementById("video");
const stopBtn = document.getElementById("stopBtn");

let selected = null;
let mode = "normal";
let picks = [];

// 🔥 ダブルタップ用
let lastTap = 0;

// 生成
files.forEach(name=>{
    let div = document.createElement("div");
    div.className="item";
    div.dataset.name = name;

    let img = document.createElement("img");
    img.src = name + ".jpg";

    div.appendChild(img);
    main.appendChild(div);

    // シングルクリック
    div.addEventListener("click", ()=>{
        animate(div);

        if(mode==="normal"){
            selectSingle(div);
        }else{
            selectDual(div);
        }
    });

    // 🔥 ダブルクリック（PC）
    div.addEventListener("dblclick", ()=>{
        play(div.dataset.name);
    });

    // 🔥 ダブルタップ（スマホ）
    div.addEventListener("touchend", ()=>{
        let now = new Date().getTime();
        if(now - lastTap < 300){
            play(div.dataset.name);
        }
        lastTap = now;
    });

});

// タップ演出
function animate(el){
    el.classList.add("active");
    setTimeout(()=>el.classList.remove("active"),200);
}

function selectSingle(el){
    document.querySelectorAll(".item").forEach(e=>e.classList.remove("red"));
    el.classList.add("red");
    selected = el.dataset.name;

    if(selected==="erabu"){
        mode="select";
        picks=[];
    }
}

function selectDual(el){
    if(picks.length>=2) return;

    picks.push(el);
    el.classList.add(picks.length===1?"red":"blue");

    if(picks.length===2){
        showDual();
    }
}

function showDual(){
    main.innerHTML="";
    main.className="dual";

    picks.forEach(p=>{
        let img=document.createElement("img");
        img.src=p.dataset.name+".jpg";
        img.dataset.name=p.dataset.name;
        main.appendChild(img);
    });
}

function clearPlaying(){
    document.querySelectorAll(".playing").forEach(e=>{
        e.classList.remove("playing");
    });
}

function play(name){

    clearPlaying();
    stopBtn.style.display="block";

    audio.pause();
    audio.currentTime=0;

    video.pause();
    video.style.display="none";

    audio.src = name + ".mp3";
    audio.play().catch(()=>{
        video.src = name + ".mp4";
        video.style.display="block";
        video.play();
    });

    if(mode==="normal"){
        let el = document.querySelector(`[data-name="${name}"]`);
        if(el) el.classList.add("playing");
    }

    if(mode==="select"){
        document.querySelectorAll(".dual img").forEach(img=>{
            if(img.dataset.name === name){
                img.classList.add("playing");
            }
        });
    }
}

stopBtn.onclick = ()=>{
    audio.pause();
    audio.currentTime=0;

    video.pause();
    video.style.display="none";

    stopBtn.style.display="none";
    clearPlaying();
};

document.addEventListener("keydown",(e)=>{
    if(e.repeat) return;

    if(mode==="normal"){
        if(!selected) return;

        if(e.key==="a"||e.key==="b"||e.key==="k"){
            play(selected);
        }
    }

    if(mode==="select" && picks.length===2){
        if(e.key==="a") play(picks[0].dataset.name);
        if(e.key==="b") play(picks[1].dataset.name);
    }
});

document.getElementById("backBtn").onclick=()=>{
    location.reload();
};

</script>

</body>
</html>
