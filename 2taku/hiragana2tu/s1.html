<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fff;
      box-sizing: border-box;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1vw 1vw 2vw;
      box-sizing: border-box;
    }

    .screen.hidden {
      display: none !important;
    }

    #modeScreen {
      gap: 1.5vw;
    }

    .mode-btn {
      width: min(70vw, 320px);
      padding: 1.4vw 1.2vw;
      font-size: clamp(14px, 3.2vw, 24px);
      font-weight: bold;
      border: 0.5vw solid #000;
      border-radius: 2vw;
      background: #fff;
      cursor: pointer;
    }

    #question {
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(92vw, 900px);
      margin: 0.8vw 0 0.8vw 0;
      min-height: 7vw;
    }

    #questionText {
      font-size: clamp(22px, 5.8vw, 46px);
      font-weight: bold;
      background: #fff;
      padding: 1.2vw 2.4vw;
      border-radius: 1.4vw;
      box-shadow: 0 0 0 0.35vw #000;
      z-index: 2;
      position: relative;
      display: inline-block;
      line-height: 1.1;
    }

    #questionImage {
      display: none;
      width: min(32vw, 220px);
      max-width: 220px;
      margin: 0 0 0.8vw 0;
      border: 0.4vw solid #000;
      border-radius: 1.3vw;
      background: #fff;
      object-fit: cover;
      aspect-ratio: 1/1;
    }

    #questionImage.active {
      display: block;
    }

    .options {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-end;
      gap: min(3vw, 24px);
      width: min(96vw, 900px);
      flex-wrap: wrap;
      margin-top: 0.4vw;
    }

    .option-img {
      width: min(30vw, 220px);
      max-width: 220px;
      min-width: 110px;
      margin: 0.6vw 0.4vw;
      cursor: pointer;
      border: 0.4vw solid #000;
      border-radius: 1.3vw;
      background: #fff;
      box-sizing: border-box;
      transition: transform 0.2s;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-drag: none;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }

    .option-btn {
      min-width: min(24vw, 180px);
      padding: 1.8vw 2.4vw;
      margin: 0.6vw 0.4vw;
      font-size: clamp(20px, 5.2vw, 36px);
      font-weight: bold;
      line-height: 1.1;
      border: 0.4vw solid #000;
      border-radius: 1.3vw;
      background: #fff;
      cursor: pointer;
      color: #000;
      touch-action: manipulation;
      user-select: none;
    }

    .zoom {
      transform: scale(1.2);
    }

    #resultImg {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 50vw;
      max-height: 50vh;
      z-index: 9999;
    }

    @media (max-width: 600px) {
      #questionText {
        font-size: clamp(20px, 7.6vw, 30px);
      }
      .option-img {
        width: min(40vw, 180px);
      }
      .option-btn {
        min-width: min(36vw, 150px);
        font-size: clamp(18px, 7vw, 28px);
      }
      .mode-btn {
        font-size: clamp(14px, 4.2vw, 20px);
      }
    }
  </style>
</head>
<body>

<div id="modeScreen" class="screen">
  <h1>きょうのたのしいべんきょう</h1>
  <button class="mode-btn" data-mode="text">これまで通りのクイズ</button>
  <button class="mode-btn" data-mode="imageName">画像で答える</button>
</div>

<div id="quizContainer" class="screen hidden">
  <h1>きょうのたのしいべんきょう</h1>
  <div id="question">
    <span id="questionText"></span>
  </div>
  <img id="questionImage" alt="">
  <div id="options" class="options"></div>
  <div id="completionMessage" hidden>
    <h2>ぜんもんだいしゅうりょう！</h2>
    <button class="mode-btn" id="backToModeBtn">もどる</button>
  </div>
  <audio id="correctAudio" src="audio/seikai.mp3"></audio>
  <audio id="incorrectAudio" src="audio/matigai.mp3"></audio>
  <img id="resultImg" src="images/seikai.gif" alt="正解画像">
</div>

<script>
  const imageFiles = [
    "きき.jpg",
    "ここ.jpg",
    "ささ.jpg",
    "しし.jpg",
    "すす.jpg",
    "たた.jpg",
    "ちち.jpg",
    "はは.jpg",
    "みみ.jpg",
    "もも.jpg"
  ];

  const questions = imageFiles.map((file) => ({
    file,
    name: file.replace(/\.jpg$/i, "")
  }));

  const MAX_QUESTIONS = 10;

  let currentMode = null;
  let currentQuestion = 0;
  let usedQuestions = [];
  let questionCount = 0;

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function resetQuizView() {
    const questionText = document.getElementById("questionText");
    const questionImage = document.getElementById("questionImage");
    const optionsContainer = document.getElementById("options");
    const completionMessage = document.getElementById("completionMessage");

    questionText.textContent = "";
    questionImage.src = "";
    questionImage.classList.remove("active");
    optionsContainer.innerHTML = "";
    completionMessage.hidden = true;
  }

  function setScreen(screenName) {
    const modeScreen = document.getElementById("modeScreen");
    const quizContainer = document.getElementById("quizContainer");
    modeScreen.classList.toggle("hidden", screenName !== "mode");
    quizContainer.classList.toggle("hidden", screenName !== "quiz");
  }

  function showModeScreen() {
    resetQuizView();
    setScreen("mode");
    currentMode = null;
    usedQuestions = [];
    questionCount = 0;
  }

  function startQuiz(mode) {
    currentMode = mode;
    usedQuestions = [];
    questionCount = 0;
    resetQuizView();
    setScreen("quiz");
    loadQuestion();
  }

  function loadQuestion() {
    if (questionCount >= MAX_QUESTIONS) {
      document.getElementById("completionMessage").hidden = false;
      document.getElementById("options").innerHTML = "";
      document.getElementById("questionText").textContent = "";
      const questionImage = document.getElementById("questionImage");
      questionImage.src = "";
      questionImage.classList.remove("active");
      return;
    }

    let qNum;
    do {
      qNum = Math.floor(Math.random() * questions.length);
    } while (usedQuestions.includes(qNum));
    usedQuestions.push(qNum);
    questionCount += 1;
    currentQuestion = qNum;

    const question = questions[qNum];
    const questionText = document.getElementById("questionText");
    const questionImage = document.getElementById("questionImage");
    const optionsContainer = document.getElementById("options");

    if (currentMode === "text") {
      questionText.textContent = `${question.name} は どれ？`;
      questionImage.classList.remove("active");
      questionImage.src = "";
    } else {
      questionText.textContent = "これはなんですか？";
      questionImage.src = "images/" + question.file;
      questionImage.alt = question.name;
      questionImage.classList.add("active");
    }

    let wrongNum;
    do {
      wrongNum = Math.floor(Math.random() * questions.length);
    } while (wrongNum === qNum);

    const wrongQuestion = questions[wrongNum];
    const options = [
      currentMode === "text"
        ? { img: question.file, isCorrect: true, value: question.name }
        : { text: question.name, isCorrect: true, value: question.name },
      currentMode === "text"
        ? { img: wrongQuestion.file, isCorrect: false, value: wrongQuestion.name }
        : { text: wrongQuestion.name, isCorrect: false, value: wrongQuestion.name }
    ];
    shuffleArray(options);

    optionsContainer.innerHTML = "";
    options.forEach((option) => {
      if (currentMode === "text") {
        const optionImg = document.createElement("img");
        optionImg.src = "images/" + option.img;
        optionImg.alt = option.value;
        optionImg.className = "option-img";
        optionImg.draggable = false;
        optionImg.oncontextmenu = (e) => e.preventDefault();
        optionImg.onmousedown = (e) => { if (e.button === 2) e.preventDefault(); };
        optionImg.ontouchstart = (e) => { if (e.touches.length > 1) e.preventDefault(); };
        optionImg.onclick = () => checkAnswer(option.isCorrect, optionImg);
        optionsContainer.appendChild(optionImg);
      } else {
        const optionBtn = document.createElement("button");
        optionBtn.className = "option-btn";
        optionBtn.textContent = option.text;
        optionBtn.onclick = () => checkAnswer(option.isCorrect, optionBtn);
        optionsContainer.appendChild(optionBtn);
      }
    });
  }

  function checkAnswer(isCorrect, elem) {
    elem.classList.add("zoom");
    setTimeout(() => {
      elem.classList.remove("zoom");
      if (isCorrect) {
        document.getElementById("correctAudio").play();
        document.getElementById("resultImg").style.display = "block";
        setTimeout(() => {
          document.getElementById("resultImg").style.display = "none";
          loadQuestion();
        }, 2000);
      } else {
        document.getElementById("incorrectAudio").play();
      }
    }, 200);
  }

  document.querySelectorAll(".mode-btn").forEach((btn) => {
    if (btn.id === "backToModeBtn") {
      btn.addEventListener("click", showModeScreen);
    } else if (!btn.id) {
      btn.addEventListener("click", () => startQuiz(btn.dataset.mode));
    }
  });

  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
  document.addEventListener('gestureend', function(e) { e.preventDefault(); });
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  document.addEventListener('mousedown', function(e) { if (e.button === 2) e.preventDefault(); });
  document.addEventListener('touchstart', function(e) { if (e.touches.length > 1) e.preventDefault(); });
  document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });
</script>

</body>
</html>
