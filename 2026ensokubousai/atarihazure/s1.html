<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あたり・はずれクイズ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fff;
    }

    #quizContainer {
      width: 100vw;
      max-width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #questionText {
      font-size: 7vw;
      font-weight: bold;
      background: #fff;
      padding: 2vw 4vw;
      border-radius: 2vw;
      box-shadow: 0 0 0 0.5vw #000;
      z-index: 2;
      position: relative;
      display: inline-block;
      line-height: 1.2;
      margin: 2vw 0 4vw 0;
    }

    .options {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-end;
      gap: 5vw;
      width: 100vw;
      flex-wrap: wrap;
    }

    .option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1vw;
    }

    .option-img {
      width: 38vw;
      max-width: 400px;
      min-width: 120px;
      cursor: pointer;
      border: 0.7vw solid #000;
      border-radius: 2vw;
      background: #fff;
      box-sizing: border-box;
      transition: transform 0.2s;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-drag: none;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }

    .option-img.selected {
      border: 0.7vw solid #ff0000;
      box-shadow: 0 0 10px #ff0000;
    }

    .zoom {
      transform: scale(1.2);
    }

    .key-label {
      font-size: 5vw;
      font-weight: bold;
      color: #333;
      margin-top: 1vw;
    }

    #resultImg {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 50vw;
      max-height: 50vh;
      z-index: 9999;
    }

    #questionNumber {
      font-size: 4vw;
      margin-top: 2vw;
      color: #666;
    }

    @media (max-width: 600px) {
      #questionText {
        font-size: 10vw;
      }
      .option-img {
        width: 45vw;
      }
      .key-label {
        font-size: 6vw;
      }
    }
  </style>
</head>
<body>

<div id="quizContainer">
  <h1>あたり・はずれクイズ</h1>
  <div id="questionNumber"></div>
  <div id="question">
    <span id="questionText"></span>
  </div>
  <div id="options" class="options">
    <!-- Options will be dynamically added here -->
  </div>
  <audio id="correctAudio" src="audio/seikai.mp3"></audio>
  <audio id="incorrectAudio" src="audio/matigai.mp3"></audio>
  <img id="resultImg" src="images/seikai.gif" alt="正解画像">
</div>

<script>
  // 5問の問題設定
  const quizData = [
    {
      question: "もんだい１",
      correct: "atari1.jpg",
      wrong: "hazure2.jpg",
      correctExt: ".jpg"
    },
    {
      question: "もんだい２",
      correct: "atari2.jpg",
      wrong: "hazure2.jpg",
      correctExt: ".jpg"
    },
    {
      question: "もんだい３",
      correct: "atari3.jpg",
      wrong: "hazure2.jpg",
      correctExt: ".jpg"
    },
    {
      question: "もんだい４",
      correct: "atari4.jpg",
      wrong: "hazure2.jpg",
      correctExt: ".jpg"
    },
    {
      question: "もんだい５",
      correct: "atari5.gif",
      wrong: "hazure5.gif",
      correctExt: ".gif"
    }
  ];

  let currentQuestionIndex = 0;
  let selectedOption = null;
  let isAnswering = false;

  // Function to load a new question
  function loadQuestion() {
    if (currentQuestionIndex >= quizData.length) {
      document.getElementById("quizContainer").innerHTML = "<h2>ぜんもんだいしゅうりょう！</h2>";
      return;
    }

    const quiz = quizData[currentQuestionIndex];
    isAnswering = false;
    selectedOption = null;

    document.getElementById("questionNumber").textContent = `もんだい ${currentQuestionIndex + 1} / ${quizData.length}`;
    document.getElementById("questionText").textContent = quiz.question;

    // Create options with random order
    const options = [
      {img: quiz.correct, isCorrect: true, side: null},
      {img: quiz.wrong, isCorrect: false, side: null}
    ];

    // Shuffle and assign left/right
    if (Math.random() > 0.5) {
      options[0].side = "left";
      options[1].side = "right";
    } else {
      options[0].side = "right";
      options[1].side = "left";
    }

    // Sort by side
    options.sort((a, b) => a.side === "left" ? -1 : 1);

    // Display options
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    options.forEach((option, index) => {
      const optionDiv = document.createElement("div");
      optionDiv.className = "option";

      const optionImg = document.createElement("img");
      optionImg.src = "images/" + option.img;
      optionImg.alt = "Option";
      optionImg.className = "option-img";
      optionImg.draggable = false;
      optionImg.oncontextmenu = (e) => e.preventDefault();
      optionImg.onmousedown = (e) => { if (e.button === 2) e.preventDefault(); };
      optionImg.onclick = (e) => {
        selectOption(index, option.isCorrect, optionImg);
      };

      const keyLabel = document.createElement("div");
      keyLabel.className = "key-label";
      keyLabel.textContent = option.side === "left" ? "A キー" : "B キー";

      optionDiv.appendChild(optionImg);
      optionDiv.appendChild(keyLabel);
      optionsContainer.appendChild(optionDiv);
    });

    // Store for keyboard input
    window.currentOptions = options;
  }

  // Function to select an option
  function selectOption(index, isCorrect, imgElem) {
    if (isAnswering) return;
    isAnswering = true;

    selectedOption = index;
    const allImages = document.querySelectorAll('.option-img');
    allImages.forEach((img, i) => {
      if (i === index) {
        img.classList.add("selected", "zoom");
      }
    });

    // Remove zoom and selection styling after 200ms
    setTimeout(() => {
      allImages.forEach(img => {
        img.classList.remove("zoom");
      });

      if (isCorrect) {
        document.getElementById("correctAudio").play();
        document.getElementById("resultImg").style.display = "block";
        setTimeout(() => {
          document.getElementById("resultImg").style.display = "none";
          allImages.forEach(img => {
            img.classList.remove("selected");
          });
          currentQuestionIndex++;
          loadQuestion();
        }, 2000);
      } else {
        document.getElementById("incorrectAudio").play();
        setTimeout(() => {
          allImages.forEach(img => {
            img.classList.remove("selected");
          });
          isAnswering = false;
        }, 500);
      }
    }, 200);
  }

  // Keyboard input handler
  document.addEventListener('keydown', function(e) {
    if (e.key.toUpperCase() === 'A') {
      const options = document.querySelectorAll('.option-img');
      if (options.length > 0 && !isAnswering) {
        selectOption(0, window.currentOptions[0].isCorrect, options[0]);
      }
    } else if (e.key.toUpperCase() === 'B') {
      const options = document.querySelectorAll('.option-img');
      if (options.length > 1 && !isAnswering) {
        selectOption(1, window.currentOptions[1].isCorrect, options[1]);
      }
    }
  });

  // Prevent gestures and context menu
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
  document.addEventListener('gestureend', function(e) { e.preventDefault(); });
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  document.addEventListener('mousedown', function(e) { if (e.button === 2) e.preventDefault(); });
  document.addEventListener('touchstart', function(e) { if (e.touches.length > 1) e.preventDefault(); });
  document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });

  // Initial question load
  loadQuestion();
</script>

</body>
</html>
