<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 防災遠足メニュー</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Hiragino Kaku Gothic Pro', Meiryo, sans-serif;
      background: linear-gradient(135deg, #f2f7ff 0%, #e6f1ff 100%);
      color: #1f3252;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      text-align: center;
    }
    p {
      margin: 0 0 24px;
      font-size: 1rem;
      text-align: center;
      max-width: 520px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 860px;
    }
    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 180px;
      padding: 18px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 16px 32px rgba(31, 50, 82, 0.12);
      text-decoration: none;
      color: inherit;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 22px 38px rgba(31, 50, 82, 0.18);
    }
    .card-title {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
    }
    .card-text {
      margin: 10px 0 0;
      text-align: center;
      color: #56607a;
      font-size: 0.96rem;
      line-height: 1.5;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #4c7cff 0%, #77b6ff 100%);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.22);
      color: white;
      font-size: 2rem;
      font-weight: 900;
    }
    @media (max-width: 520px) {
      body {
        padding: 16px;
      }
      .card {
        min-height: 150px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <h1>2026 防災遠足メニュー</h1>
  <p>このページから「2択クイズ」「地震軽度」「地震崩壊」「選ぶマップ」の4つのプログラムにアクセスできます。アイコンをタップして、それぞれのページへ進んでください。</p>
  <div class="grid">
    <a class="card" href="ensoku2taku/s1.html">
      <div class="icon">？</div>
      <h2 class="card-title">2択クイズ</h2>
      <p class="card-text">2つの選択肢から正しい答えを選ぶクイズです。</p>
    </a>
    <a class="card" href="jisinapp/keido/s1.html">
      <div class="icon">⚡</div>
      <h2 class="card-title">地震軽度</h2>
      <p class="card-text">地震の揺れの強さを楽しく学べるページです。</p>
    </a>
    <a class="card" href="jisinapp/houkai/s1.html">
      <div class="icon">🧱</div>
      <h2 class="card-title">地震崩壊</h2>
      <p class="card-text">地震による崩壊や被害を体験できるコンテンツです。</p>
    </a>
    <a class="card" href="eraberumap/s1.html">
      <div class="icon">🗺️</div>
      <h2 class="card-title">選ぶマップ</h2>
      <p class="card-text">防災マップを選んで学べるページです。</p>
    </a>
  </div>
</body>
</html>
