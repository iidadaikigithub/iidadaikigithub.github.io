<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たなばた</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d) infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.2; }
  100% { opacity: 1; }
}

.container {
  display: flex;
  gap: 60px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.btn {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.3);
  font-size: 2rem;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.btn-tanabata {
  background: radial-gradient(circle at 30% 30%, #e74c8b, #8e44ad);
}

.btn-tanabata::before {
  background: radial-gradient(circle at 30% 30%, #ff6b9d, #a855f7);
  box-shadow: 0 0 80px rgba(231,76,139,0.5);
}

.btn-kirakira {
  background: radial-gradient(circle at 30% 30%, #f1c40f, #e67e22);
}

.btn-kirakira::before {
  background: radial-gradient(circle at 30% 30%, #ffe44d, #f97316);
  box-shadow: 0 0 80px rgba(241,196,15,0.5);
}

.btn:active {
  transform: scale(0.95);
}

.btn.active::before {
  opacity: 1;
}

.btn.active {
  transform: scale(1.05);
  border-color: rgba(255,255,255,0.8);
}

.btn-label {
  position: relative;
  z-index: 1;
  text-align: center;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  pointer-events: none;
}

.btn-label small {
  display: block;
  font-size: 1rem;
  opacity: 0.7;
  margin-top: 8px;
}

.key-hint {
  position: relative;
  z-index: 1;
  font-size: 0.875rem;
  opacity: 0.5;
  margin-top: 16px;
}

@media (max-width: 700px) {
  .btn {
    width: 200px;
    height: 200px;
    font-size: 1.5rem;
  }
  .container { gap: 30px; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <button class="btn btn-tanabata" id="btn-tanabata">
    <div class="btn-label">
      たなばた
      <small>Tanabata</small>
      <div class="key-hint">[ A ]</div>
    </div>
  </button>
  <button class="btn btn-kirakira" id="btn-kirakira">
    <div class="btn-label">
      きらきら星
      <small>Kirakira</small>
      <div class="key-hint">[ B ]</div>
    </div>
  </button>
</div>

<script>
// Stars
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--d', (1 + Math.random() * 3) + 's');
    star.style.animationDelay = Math.random() * 3 + 's';
    const size = 1 + Math.random() * 2;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    container.appendChild(star);
  }
})();

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let tanabataBuffer = null;
let kirakiraBuffer = null;

const tanabataState = {
  position: 0,
  source: null,
  gain: null,
  fadeTimer: null,
  isPlaying: false,
  startTime: 0,
  btn: document.getElementById('btn-tanabata'),
};

const kirakiraState = {
  position: 0,
  source: null,
  gain: null,
  fadeTimer: null,
  isPlaying: false,
  startTime: 0,
  btn: document.getElementById('btn-kirakira'),
};

function loadAudio(url) {
  return fetch(url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
    .then(b => audioCtx.decodeAudioData(b));
}

Promise.all([
  loadAudio('tanabata.mp3').then(b => { tanabataBuffer = b; }),
  loadAudio('kirakira.mp3').then(b => { kirakiraBuffer = b; }),
]).catch(e => console.error('Audio load error:', e));

function getPos(state) {
  return state.isPlaying
    ? state.position + (audioCtx.currentTime - state.startTime)
    : state.position;
}

function stopSource(state) {
  clearTimeout(state.fadeTimer);
  if (state.source) {
    try { state.source.stop(); } catch(e) {}
    state.source.disconnect();
    state.source = null;
  }
  if (state.gain) {
    state.gain.disconnect();
    state.gain = null;
  }
}

function stopTrack(state) {
  if (!state.isPlaying) return;
  state.position = getPos(state);
  stopSource(state);
  state.isPlaying = false;
  state.btn.classList.remove('active');
}

function fadeOut(state) {
  if (!state.isPlaying || !state.gain) return;
  state.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
  setTimeout(() => stopTrack(state), 1000);
}

function playTrack(buffer, state) {
  if (!buffer) return;

  if (state.isPlaying) {
    clearTimeout(state.fadeTimer);
    state.fadeTimer = setTimeout(() => fadeOut(state), 5000);
    state.btn.classList.add('active');
    return;
  }

  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  stopSource(state);

  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  source.buffer = buffer;
  source.connect(gain);
  gain.connect(audioCtx.destination);

  // If position is near end, loop back to start
  if (state.position >= buffer.duration - 0.1) {
    state.position = 0;
  }

  source.start(0, state.position);

  state.source = source;
  state.gain = gain;
  state.isPlaying = true;
  state.startTime = audioCtx.currentTime;
  state.btn.classList.add('active');

  state.fadeTimer = setTimeout(() => fadeOut(state), 5000);
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (key === 'a') {
    e.preventDefault();
    playTrack(tanabataBuffer, tanabataState);
  } else if (key === 'b') {
    e.preventDefault();
    playTrack(kirakiraBuffer, kirakiraState);
  }
});

document.getElementById('btn-tanabata').addEventListener('click', () => {
  playTrack(tanabataBuffer, tanabataState);
});

document.getElementById('btn-kirakira').addEventListener('click', () => {
  playTrack(kirakiraBuffer, kirakiraState);
});
</script>
</body>
</html>
