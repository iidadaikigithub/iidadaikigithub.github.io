<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パチンコスロット</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow-y:auto;user-select:none;padding:10px 0}
#app{display:flex;gap:12px;padding:12px;background:#2d2d44;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);flex-wrap:wrap;justify-content:center;max-height:100vh}
canvas{border-radius:8px;cursor:crosshair;background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3a 100%);max-width:100%;max-height:calc(100vh - 24px)}
#panel{width:340px;display:flex;flex-direction:column;gap:8px;color:#e0e0e0;font-size:13px;max-height:calc(100vh - 24px);overflow-y:auto}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:#555;border-radius:2px}
.panel-section{background:#3a3a5a;border-radius:8px;padding:10px;border:1px solid #4a4a6a}
.panel-section h3{font-size:13px;color:#8af;margin-bottom:6px;border-bottom:1px solid #4a4a6a;padding-bottom:4px}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:3px 0}
.row label{min-width:70px;font-size:12px;color:#aaa}
.row input[type=range]{flex:1;min-width:60px}
.row input[type=number]{width:60px;background:#222;border:1px solid #555;color:#e0e0e0;padding:2px 4px;border-radius:4px;font-size:12px}
.row span{min-width:30px;text-align:right;font-size:12px;color:#8af}
.btn{background:#4a6a9a;color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;transition:.15s}
.btn:hover{background:#5a7aaa;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:#2a8a4a}
.btn-primary:hover{background:#3a9a5a}
.btn-danger{background:#8a3a3a}
.btn-danger:hover{background:#9a4a4a}
.btn-warning{background:#8a7a2a}
.btn-warning:hover{background:#9a8a3a}
.btn-gold{background:#8a7a2a}
.btn-gold:hover{background:#b8960f}
.btn-sm{padding:3px 8px;font-size:11px}
.btn.active{box-shadow:inset 0 2px 4px rgba(0,0,0,.5);background:#6a4a9a}
.tool-group{display:flex;gap:3px;flex-wrap:wrap}
#mode-label{font-weight:bold;color:#8af;font-size:14px}
#score-display{font-size:18px;font-weight:bold;color:#ffd700}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:#aaa;padding:1px 0}
.color-opt{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.1s}
.color-opt:hover,.color-opt.active{border-color:#fff}
.hidden{display:none!important}
input[type=color]{width:30px;height:26px;border:none;background:transparent;cursor:pointer}
input[type=checkbox]{cursor:pointer}
select{background:#222;color:#e0e0e0;border:1px solid #555;padding:2px 4px;border-radius:4px;font-size:12px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333c;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
.chart-row{display:flex;gap:4px;align-items:center;margin:2px 0;font-size:11px}
.chart-bar{height:12px;border-radius:2px;min-width:2px;transition:width .3s}
.history-item{font-size:11px;color:#aaa;padding:1px 0}
.slot-reel{display:inline-block;width:30px;height:36px;line-height:36px;text-align:center;font-size:22px;background:#111;border:1px solid #555;border-radius:4px;margin:0 2px;overflow:hidden;vertical-align:middle}
.slot-window{background:#111;border:2px solid #ffd700;border-radius:6px;padding:4px 8px;display:inline-block}
.lamp{display:inline-block;width:16px;height:16px;border-radius:50%;margin:0 3px;background:#333;border:1px solid #555;transition:all .3s}
.lamp.on{background:#ff4444;box-shadow:0 0 10px #ff4444,0 0 20px #ff444488}
.money-display{font-size:22px;font-weight:bold;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5)}
.ball-display{font-size:22px;font-weight:bold;color:#44aaff;text-shadow:0 0 10px rgba(68,170,255,0.5)}
.value-display{font-size:18px;font-weight:bold;color:#8ff;text-shadow:0 0 8px rgba(136,255,255,0.4)}
.profit-display{font-size:20px;font-weight:bold;text-shadow:0 0 8px rgba(255,255,255,0.3)}
@keyframes profitFlash{0%{color:#fff;text-shadow:0 0 20px #ffd700,0 0 40px #ffd700}50%{color:#ffd700;text-shadow:0 0 10px #ffd700}100%{color:#fff;text-shadow:0 0 20px #ffd700,0 0 40px #ffd700}}
.slot-sym-btn{width:32px;height:32px;font-size:16px;text-align:center;padding:0;margin:1px}
</style>
</head>

<script>
// ============================================================
// VECTOR
// ============================================================
class Vec {
  constructor(x=0,y=0){this.x=x;this.y=y}
  add(v){return new Vec(this.x+v.x,this.y+v.y)}
  sub(v){return new Vec(this.x-v.x,this.y-v.y)}
  mul(s){return new Vec(this.x*s,this.y*s)}
  dot(v){return this.x*v.x+this.y*v.y}
  len(){return Math.sqrt(this.x*this.x+this.y*this.y)}
  len2(){return this.x*this.x+this.y*this.y}
  normalize(){let l=this.len();return l>0?this.mul(1/l):new Vec()}
  dist(v){return this.sub(v).len()}
  cross(v){return this.x*v.y-this.y*v.x}
  rot(a){let c=Math.cos(a),s=Math.sin(a);return new Vec(this.x*c-this.y*s,this.x*s+this.y*c)}
  angle(){return Math.atan2(this.y,this.x)}
  clone(){return new Vec(this.x,this.y)}
}


// ============================================================
// SLOT SYMBOLS
// ============================================================
const SLOT_SYMBOLS = [
  {id:'s1', label:'s1', name:'1', imgSrc:'s1.jpg'},
  {id:'s2', label:'s2', name:'2', imgSrc:'s2.jpg'},
  {id:'s3', label:'s3', name:'3', imgSrc:'s3.jpg'},
  {id:'s4', label:'s4', name:'4', imgSrc:'s4.jpg'},
  {id:'s5', label:'s5', name:'5', imgSrc:'s5.jpg'},
  {id:'s6', label:'s6', name:'6', imgSrc:'s6.jpg'},
  {id:'s7', label:'s7', name:'7', imgSrc:'s7.jpg'},
  {id:'s8', label:'s8', name:'8', imgSrc:'s8.jpg'},
];

// ============================================================
// PHYSICS
// ============================================================
const G=800, REST=0.4, FRIC=0.2, AIR=0.002;
const TAGS={PIN:'pin',WALL:'wall',HOLE:'hole',OBSTACLE:'obstacle',BALL:'ball'};

class Body {
  constructor(x,y,type){
    this.pos=new Vec(x,y);
    this.vel=new Vec();
    this.acc=new Vec();
    this.type=type;
    this.r=6;
    this.mass=1;
    this.restitution=REST/100;
    this.friction=FRIC/100;
    this.angle=0;
    this.angVel=0;
    this.fixed=false;
    this.id=Body._id++;
    this.alive=true;
    this.score=0;
    this.holeId=-1;
    this.color='#ff4444';
    this.w=20;
    this.h=20;
  }
  applyForce(f){if(!this.fixed)this.acc=this.acc.add(f.mul(1/this.mass))}
  update(dt,grav){
    if(this.fixed)return;
    let drag=this.vel.mul(-AIR/1000*this.r);
    this.vel=this.vel.add(this.acc.mul(dt)).add(drag);
    if(grav)this.vel=this.vel.add(new Vec(0,grav*dt));
    this.pos=this.pos.add(this.vel.mul(dt));
    this.angle+=this.angVel*dt;
    this.angVel*=0.99;
    this.acc=new Vec();
  }
}
Body._id=0;

// ============================================================
// MAIN GAME
// ============================================================
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=800;
canvas.height=900;

let W=canvas.width, H=canvas.height;

class Pachinko {
  constructor(){
    this.bodies=[];
    this.pins=[];
    this.walls=[];
    this.holes=[];
    this.obstacles=[];
    this.balls=[];
    this.gravity=800;
    this.restitution=0.40;
    this.friction=0.20;
    this.airResist=0.002;
    this.ballCollision=true;
    this.launchX=400;
    this.launchSpeed=25;
    this.launchAngle=0;
    this.ballSize=6;
    this.ballColor='#ff4444';
    this.gameMode=false;
    this.autoFire=false;
    this.autoFireInterval=null;
    this.score=0;
    this.totalFired=0;
    this.highScore=0;
    this.stats={holes:{}};
    this.scores=[];
    this.history=[];
    this.undoStack=[];
    this.redoStack=[];
    this.tool='pin';
    this.placeMode='free';
    this.wallAngle=0;
    this.draggingBody=null;
    this.dragOffset=new Vec();
    this.createdCount=0;
    this.replayData=[];
    this.chartType='histogram';
    this.prevTime=0;
    this.fps=0;
    this.fpsCount=0;
    this.fpsTime=0;
    this.showFps=false;
    this.debugMode=false;
    this.combo=0;
    this.comboTimer=0;
    this.particles=[];
    this.ledMode=false;
    this.dropIntervalId=null;
    this.dropIntervalMs=400;
    this.boardCx=400;this.boardCy=390;
    this.boardRx=310;this.boardRy=390;
    this.boardCutoutY=this.boardCy+this.boardRy*0.78;

    // Slot system
    this.money=0;
    this.ballsOwned=0;
    this.ballsUsed=0;
    this.pricePerBall=5;
    this.lampsLit=0;
    this.maxLamps=4;
    this.lampStates=[false,false,false,false];
    this.slotSpinning=false;
    this.slotReels=[0,0,0];
    this.slotTarget=[0,0,0];
    this.slotTimer=0;
    this.slotDuration=2.0;
    this.slotSpinSpeed=30;
    this.slotProbMult=1.0;
    this.slotPayoutMult=1.0;
    this.slotWinAmount=0;
    this.slotWinTimer=0;
    this.slotWinText='';
    this.slotReelPos=[0,0,0];
    this.slotReelSpeed=[30,32,35];
    this.slotReelStopped=[false,false,false];

    // Symbol probabilities (7 symbols, weights for each reel position)
    this.symbolWeights=SLOT_SYMBOLS.map(()=>10);

    // Symbol payouts (balls won for 3 matching symbols)
    this.symbolPayouts=[20,30,50,80,150,300,500];

    this.hitsToSpin=1;
    this.pendingSpins=0;
    this.holeHitCount=0;
    this.bgmTracks=['patibgm.mp3','patibgm2.mp3'];
    this.fiverBgm='fiver.mp3';
    this.bigChanceMode=false;
    this.feverTimer=0;
    this.feverDuration=30;
    this.feverQueued=false;
    this.totalBallsWon=0;
    this.rainbowHue=0;

    this.slotResultHistory=[];
    this.totalSlotSpins=0;
    this._prevProfit=0;
    this._profitFlashTimer=0;

    this.setupDefaultStage();
    this.setupUI();
    this.setupSound();
    this.bgImage=new Image();
    this.bgImage.src='gakkou.jpg';
    this.slotImages=[];
    for(let i=0;i<SLOT_SYMBOLS.length;i++){
      let img=new Image();
      img.src=SLOT_SYMBOLS[i].imgSrc;
      this.slotImages.push(img);
    }
    this.render(0);
    this.gameLoop(0);
  }

  setupDefaultStage(){
    // 何も設定しない - 編集モードで自由に配置
  }

  getBoardWidthAtY(y){
    let dy=Math.abs(y-this.boardCy);
    if(dy>=this.boardRy) return 0;
    return 2*this.boardRx*Math.sqrt(1-(dy/this.boardRy)*(dy/this.boardRy));
  }

  createPin(x,y){
    let p={x,y,r:6,type:'pin',fixed:true};
    return p;
  }

  addPin(x,y){
    this.pins.push(this.createPin(x,y));
    return this.pins[this.pins.length-1];
  }

  // ============================================================
  // BALL
  // ============================================================
  fireBall(x,y){
    if(!x&&!y) x=this.launchX, y=60;
    let r=this.ballSize;
    let angleDeg=(Math.floor(Math.random()*61)-30)*0.1;
    let hSpeed=angleDeg*2.5;
    let b={
      pos:new Vec(x,y),
      vel:new Vec(hSpeed,this.launchSpeed),
      r,
      mass:r*r,
      color:this.ballColor,
      alive:true,
      id:'ball_'+(this.createdCount++),
      restitution:this.restitution,
      friction:this.friction,
      angle:0,
      angVel:0,
      trail:[]
    };
    this.balls.push(b);
    this.totalFired++;
    this.ballsOwned--;
    this.ballsUsed++;
    this.money-=this.pricePerBall;
    this.updateMoneyDisplay();
    this.playSound('launch');
    return b;
  }

  fireBalls(n){
    for(let i=0;i<n;i++) {
      setTimeout(()=>{
        if(!this.gameMode) return;
        this.fireBall();
        if(i===n-1) this.toast(`${n}個発射完了`);
      },i*30);
    }
  }

  startAutoFire(){
    if(this.autoFireInterval) return;
    this.autoFire=true;
    this.autoFireInterval=setInterval(()=>{
      if(this.gameMode) this.fireBall();
    },150);
  }

  stopAutoFire(){
    this.autoFire=false;
    if(this.autoFireInterval){
      clearInterval(this.autoFireInterval);
      this.autoFireInterval=null;
    }
  }

  lightLamp(){
    if(this.lampsLit<this.maxLamps){
      this.lampStates[this.lampsLit]=true;
      this.lampsLit++;
      this.updateLampUI();
      this.playSound('score');
    }
  }

  startFever(){
    this.bigChanceMode=true;
    this.feverTimer=this.feverDuration;
    this.switchBGM(this.fiverBgm);
    this.toast('🔥 フィーバータイム！30秒間スロット回し放題！');
    document.getElementById('spinBtn').disabled=false;
  }

  endFever(){
    this.bigChanceMode=false;
    this.feverTimer=0;
    let wasPlaying=this.bgmPlaying;
    this.stopBGM();
    this.pickRandomBGM();
    if(wasPlaying){
      this.bgmAudio.play().catch(()=>{});
      this.bgmPlaying=true;
    }
    this.updateLampUI();
    this.toast('フィーバー終了');
  }

  resetLamps(){
    this.lampsLit=0;
    this.lampStates=[false,false,false,false];
    this.updateLampUI();
    document.getElementById('spinBtn').disabled=true;
  }

  updateLampUI(){
    for(let i=0;i<this.maxLamps;i++){
      let el=document.getElementById('lamp'+i);
      if(el){
        el.className='lamp'+(this.lampStates[i]?' on':'');
        if(this.bigChanceMode&&this.lampStates[i]){
          let hue=(this.rainbowHue+i*60)%360;
          el.style.background=`hsl(${hue},100%,50%)`;
          el.style.boxShadow=`0 0 10px hsl(${hue},100%,50%),0 0 20px hsla(${hue},100%,50%,0.5)`;
        } else if(this.lampStates[i]){
          el.style.background='';
          el.style.boxShadow='';
        }
      }
    }
    document.getElementById('lampStatus').textContent=
      this.lampsLit+'/4 点灯'+(this.bigChanceMode?` 🔥 フィーバー中 残り${Math.ceil(this.feverTimer)}秒!`:(this.lampsLit>=this.maxLamps?' Enterでフィーバー開始!':' - スロット当たりでランプ点灯'));
    document.getElementById('spinBtn').disabled=this.lampsLit<this.maxLamps||this.slotSpinning;
  }

  // ============================================================
  // SLOT MACHINE
  // ============================================================
  spinSlot(){
    if(this.slotSpinning){
      this.pendingSpins++;
      this.toast(`🎰 スロット待機中 (x${this.pendingSpins})`);
      return;
    }
    if(this.bigChanceMode && this.lampsLit>=this.maxLamps){
      this.resetLamps();
    }
    this.slotSpinning=true;
    this.slotTimer=0;
    this.slotWinAmount=0;

    // Determine result based on probabilities with slotProbMult bias
    // Higher slotProbMult => higher-value symbols more likely
    this.slotTarget=[];
    for(let reel=0;reel<3;reel++){
      let adjustedWeights=this.symbolWeights.map((w,i)=>w*Math.pow(this.slotProbMult,i));
      let totalWeight=adjustedWeights.reduce((a,b)=>a+b,0);
      let r=Math.random()*totalWeight;
      let cum=0;
      let chosen=0;
      for(let i=0;i<adjustedWeights.length;i++){
        cum+=adjustedWeights[i];
        if(r<=cum){chosen=i;break;}
      }
      this.slotTarget.push(chosen);
    }

    // Initialize reel spinning positions
    this.slotReelPos=[Math.random()*100, Math.random()*100, Math.random()*100];
    this.slotReelSpeed=[28+Math.random()*8, 30+Math.random()*8, 32+Math.random()*10];
    this.slotReelStopped=[false,false,false];

    // Check for jackpot bonus: if all 3 same, apply payout mult
    let isJackpot=this.slotTarget[0]===this.slotTarget[1]&&this.slotTarget[1]===this.slotTarget[2];
    if(isJackpot){
      let symIdx=this.slotTarget[0];
      let basePayout=this.symbolPayouts[symIdx];
      let bonusMult=1;
      if(symIdx>=5) bonusMult=2;
      else if(symIdx>=3) bonusMult=1.5;
      this.slotWinAmount=Math.floor(basePayout*bonusMult*this.slotPayoutMult);
    } else {
      let pairs=[];
      if(this.slotTarget[0]===this.slotTarget[1]) pairs.push(this.slotTarget[0]);
      if(this.slotTarget[1]===this.slotTarget[2]) pairs.push(this.slotTarget[1]);
      if(this.slotTarget[0]===this.slotTarget[2]) pairs.push(this.slotTarget[0]);
      if(pairs.length>0){
        let symIdx=pairs[0];
        let basePayout=Math.floor(this.symbolPayouts[symIdx]*0.3);
        if(basePayout<1) basePayout=1;
        this.slotWinAmount=Math.floor(basePayout*this.slotPayoutMult);
      } else {
        this.slotWinAmount=0;
      }
    }

    this.toast('🎰 スロットスタート！');
    this.playSound('launch');
  }

  finishSlot(){
    this.slotSpinning=false;
    this.totalSlotSpins++;
    if(this.slotWinAmount>0){
      this.ballsOwned+=this.slotWinAmount;
      this.totalBallsWon+=this.slotWinAmount;
      this.slotWinText='+'+this.slotWinAmount+'玉';
      this.slotWinTimer=2;
      this.toast(`🎰 当たり！ ${this.slotWinAmount}玉獲得！`);
      this.playSound('score');
      this.spawnParticles(400,820,'#ffd700',30);
      this.lightLamp();
    } else {
      this.slotWinText='ハズレ';
      this.slotWinTimer=1;
      this.toast('🎰 ハズレ... もう一度玉を入れてね');
      this.playSound('wall');
    }
    this.updateMoneyDisplay();
    this.updateSlotUI();
    if(this.feverQueued){
      this.feverQueued=false;
      this.startFever();
      this.spinSlot();
      return;
    }
    if(this.pendingSpins>0){
      this.pendingSpins--;
      this.spinSlot();
    }
  }

  triggerFeverSpin(){
    if(this.slotSpinning){
      this.feverQueued=true;
      this.toast('🔥 フィーバー待機中... スロット停止後に開始!');
      return;
    }
    if(!this.bigChanceMode){
      this.startFever();
    }
    this.spinSlot();
  }

  // ============================================================
  // PHYSICS UPDATE
  // ============================================================
  update(dt){
    dt=Math.min(dt,0.033);

    // Slot spinning - reel animation
    if(this.slotSpinning){
      this.slotTimer+=dt;
      const stopTimes=[0.6,1.2,1.8];
      // Update reel positions
      for(let i=0;i<3;i++){
        if(!this.slotReelStopped[i]){
          // Decelerate as approaching stop
          let speedMult=1;
          if(this.slotTimer>=stopTimes[i]-0.3) speedMult=1-(this.slotTimer-(stopTimes[i]-0.3))/0.3*0.7;
          if(speedMult<0.3) speedMult=0.3;
          this.slotReelPos[i]+=this.slotReelSpeed[i]*dt*speedMult;
        }
      }
      // Stop reels one by one
      for(let i=0;i<3;i++){
        if(this.slotTimer>=stopTimes[i]&&!this.slotReelStopped[i]){
          this.slotReelStopped[i]=true;
          // Ensure last shown symbol is the target
          this.slotReelPos[i]=this.slotTarget[i];
        }
      }
      if(this.slotTimer>=this.slotDuration){
        this.slotReels=[...this.slotTarget];
        this.finishSlot();
      }
    }

    // Slot win timer
    if(this.slotWinTimer>0) this.slotWinTimer-=dt;
    if(this._profitFlashTimer>0) this._profitFlashTimer-=dt;

    // Fever timer
    if(this.bigChanceMode){
      this.feverTimer-=dt;
      this.rainbowHue=(this.rainbowHue+dt*180)%360;
      this.updateLampUI();
      if(this.feverTimer<=0){
        this.endFever();
        this.resetLamps();
      }
    }

    // Update balls
    for(let b of this.balls){
      if(!b.alive) continue;
      b.vel.y+=this.gravity*dt;
      let speed=b.vel.len();
      if(speed>0){
        let drag=b.vel.mul(-this.airResist*speed*dt);
        b.vel=b.vel.add(drag);
      }
      b.pos=b.pos.add(b.vel.mul(dt));
      b.angle+=b.angVel*dt;
      b.angVel*=0.98;

      // Trail
      b.trail.push({x:b.pos.x,y:b.pos.y,life:1});
      if(b.trail.length>15) b.trail.shift();
      for(let t of b.trail) t.life-=dt*3;
      b.trail=b.trail.filter(t=>t.life>0);

      // Ellipse boundary
      let dxe=b.pos.x-this.boardCx,dye=b.pos.y-this.boardCy;
      let inside=(dxe*dxe)/(this.boardRx*this.boardRx)+(dye*dye)/(this.boardRy*this.boardRy);
      if(inside>1&&b.pos.y<this.boardCutoutY-4){
        let gx=2*dxe/(this.boardRx*this.boardRx);
        let gy=2*dye/(this.boardRy*this.boardRy);
        let gl=Math.sqrt(gx*gx+gy*gy);
        if(gl>1e-8){
          let nx=gx/gl,ny=gy/gl;
          let dist=(inside-1)/gl+b.r;
          b.pos.x-=nx*dist;b.pos.y-=ny*dist;
          let vn=b.vel.x*nx+b.vel.y*ny;
          if(vn<0){b.vel.x-=nx*2*vn*this.restitution;b.vel.y-=ny*2*vn*this.restitution;}
        }
      }
      // Wall collision
      for(let w of this.walls){
        if(w.type!=='wall'&&w.type!=='floor') continue;
        let x1=w.x1,y1=w.y1,x2=w.x2,y2=w.y2;
        let dx=x2-x1,dy=y2-y1;
        let len=Math.sqrt(dx*dx+dy*dy);
        if(len<1)continue;
        let t=((b.pos.x-x1)*dx+(b.pos.y-y1)*dy)/(len*len);
        t=Math.max(0,Math.min(1,t));
        let px=x1+t*dx,py=y1+t*dy;
        let ddx=b.pos.x-px,ddy=b.pos.y-py;
        let d=Math.sqrt(ddx*ddx+ddy*ddy);
        if(d<b.r){
          let nx=ddx/d,ny=ddy/d;
          if(Number.isNaN(nx)){nx=0;ny=-1;}
          let overlap=b.r-d;
          b.pos=b.pos.add(new Vec(nx*overlap,ny*overlap));
          let vn=b.vel.x*nx+b.vel.y*ny;
          if(vn<0){
            b.vel=b.vel.sub(new Vec(nx*2*vn,ny*2*vn).mul(this.restitution));
            b.vel.x*=0.98;
            this.playSound('wall');
          }
        }
      }
      // Hole collision
      let inHole=false;
      for(let h of this.holes){
        if(b.pos.x>h.x-h.w/2&&b.pos.x<h.x+h.w/2&&b.pos.y>h.y-h.h/2-b.r){
          h.count++;h.total+=h.score;this.score+=h.score;
          b.alive=false;inHole=true;this.combo++;this.comboTimer=1;
          this.scores.push(h.score);
          this.playSound('score');
          this.showScorePopup(b.pos.x,b.pos.y,h.score);
          if(this.gameMode&&this.lampsLit<this.maxLamps){
            this.holeHitCount++;
            if(this.holeHitCount>=this.hitsToSpin){
              this.holeHitCount=0;
              this.spinSlot();
            }
          }
          break;
        }
      }
      // Ball stuck on hole edge detection - force left/right
      if(!inHole){
        let onEdge=false;
        for(let h of this.holes){
          let nearHoleY=b.pos.y>h.y-h.h/2-b.r*2&&b.pos.y<h.y+h.h/2;
          let nearHoleX=b.pos.x>h.x-h.w/2-b.r&&b.pos.x<h.x+h.w/2+b.r;
          if(nearHoleY&&nearHoleX){
            let speed=Math.sqrt(b.vel.x*b.vel.x+b.vel.y*b.vel.y);
            if(speed<30){
              if(!b._stuckTime) b._stuckTime=0;
              b._stuckTime+=dt;
              if(b._stuckTime>1.5){
                let dir=Math.random()>0.5?1:-1;
                b.vel.x=dir*60;
                b.vel.y=40;
                b._stuckTime=0;
              }
              onEdge=true;
            }
            break;
          }
        }
        if(!onEdge) b._stuckTime=0;
      }
      if(!inHole&&b.pos.y>this.boardCutoutY+10){
        this.combo=0;b.alive=false;
      }
    }

    // Combo timer
    if(this.comboTimer>0){
      this.comboTimer-=dt;
      if(this.comboTimer<=0) this.combo=0;
    }

    // Ball-pin collisions
    for(let b of this.balls){
      if(!b.alive) continue;
      for(let p of this.pins){
        let dx=b.pos.x-p.x, dy=b.pos.y-p.y;
        let dist=Math.sqrt(dx*dx+dy*dy);
        let minDist=b.r+p.r;
        if(dist<minDist&&dist>0){
          let nx=dx/dist, ny=dy/dist;
          let overlap=minDist-dist;
          b.pos=b.pos.add(new Vec(nx*overlap,ny*overlap));
          let vn=b.vel.x*nx+b.vel.y*ny;
          if(vn<0){
            b.vel=b.vel.sub(new Vec(nx*2*vn,ny*2*vn).mul(this.restitution));
            let tangent=new Vec(-ny,nx);
            let vt=b.vel.dot(tangent);
            b.vel=b.vel.sub(tangent.mul(vt*this.friction));
            b.angVel+=vt*0.1/b.r;
            this.playSound('pin');
            this.spawnParticles(p.x,p.y,'#ffd700',5);
          }
        }
      }
    }

    // Ball-ball collisions
    if(this.ballCollision){
      for(let i=0;i<this.balls.length;i++){
        let a=this.balls[i];
        if(!a.alive) continue;
        for(let j=i+1;j<this.balls.length;j++){
          let b=this.balls[j];
          if(!b.alive) continue;
          let dx=a.pos.x-b.pos.x, dy=a.pos.y-b.pos.y;
          let dist=Math.sqrt(dx*dx+dy*dy);
          let minDist=a.r+b.r;
          if(dist<minDist&&dist>0){
            let nx=dx/dist, ny=dy/dist;
            let overlap=minDist-dist;
            a.pos=a.pos.add(new Vec(nx*overlap/2,ny*overlap/2));
            b.pos=b.pos.sub(new Vec(nx*overlap/2,ny*overlap/2));
            let dvx=a.vel.x-b.vel.x, dvy=a.vel.y-b.vel.y;
            let dvn=dvx*nx+dvy*ny;
            if(dvn<0){
              let imp=2*dvn/(a.mass+b.mass);
              a.vel=a.vel.sub(new Vec(nx*imp*b.mass,ny*imp*b.mass).mul(this.restitution));
              b.vel=b.vel.add(new Vec(nx*imp*a.mass,ny*imp*a.mass).mul(this.restitution));
            }
          }
        }
      }
    }

    // Obstacle collisions
    for(let b of this.balls){
      if(!b.alive) continue;
      for(let o of this.obstacles){
        if(o.type==='circle'){
          let dx=b.pos.x-o.x, dy=b.pos.y-o.y;
          let dist=Math.sqrt(dx*dx+dy*dy);
          let minDist=b.r+o.r;
          if(dist<minDist&&dist>0){
            let nx=dx/dist, ny=dy/dist;
            b.pos=b.pos.add(new Vec(nx*(minDist-dist),ny*(minDist-dist)));
            let vn=b.vel.x*nx+b.vel.y*ny;
            if(vn<0) b.vel=b.vel.sub(new Vec(nx*2*vn,ny*2*vn).mul(this.restitution));
          }
        }else if(o.type==='tri'){
          let dx=b.pos.x-o.x, dy=b.pos.y-o.y;
          let dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<b.r+o.r&&dist>0){
            let nx=dx/dist, ny=dy/dist;
            b.pos=b.pos.add(new Vec(nx*(b.r+o.r-dist),ny*(b.r+o.r-dist)));
            let vn=b.vel.x*nx+b.vel.y*ny;
            if(vn<0) b.vel=b.vel.sub(new Vec(nx*2*vn,ny*2*vn).mul(this.restitution));
          }
        }else if(o.type==='rect'){
          let halfW=o.w/2, halfH=o.h/2;
          let dx=b.pos.x-o.x, dy=b.pos.y-o.y;
          let clampedX=Math.max(-halfW,Math.min(halfW,dx));
          let clampedY=Math.max(-halfH,Math.min(halfH,dy));
          let closestX=o.x+clampedX, closestY=o.y+clampedY;
          let dist=Math.sqrt((b.pos.x-closestX)**2+(b.pos.y-closestY)**2);
          if(dist<b.r&&dist>0){
            let nx=(b.pos.x-closestX)/dist, ny=(b.pos.y-closestY)/dist;
            b.pos=b.pos.add(new Vec(nx*(b.r-dist),ny*(b.r-dist)));
            let vn=b.vel.x*nx+b.vel.y*ny;
            if(vn<0) b.vel=b.vel.sub(new Vec(nx*2*vn,ny*2*vn).mul(this.restitution));
          }
        }
      }
    }

    // Remove dead balls
    for(let b of this.balls){
      if(b.pos.y>this.boardCutoutY+20) b.alive=false;
    }
    this.balls=this.balls.filter(b=>b.alive);

    // Update particles
    for(let p of this.particles){
      p.vel.y+=200*dt;
      p.pos=p.pos.add(p.vel.mul(dt));
      p.life-=dt*2;
    }
    this.particles=this.particles.filter(p=>p.life>0);

    // Update stats
    document.getElementById('statFired').textContent=this.totalFired;
    document.getElementById('statScore').textContent=this.score;
    if(this.scores.length>0){
      let max=Math.max(...this.scores);
      let min=Math.min(...this.scores);
      let avg=this.scores.reduce((a,b)=>a+b,0)/this.scores.length;
      document.getElementById('statMax').textContent=max;
      document.getElementById('statMin').textContent=min;
      document.getElementById('statAvg').textContent=avg.toFixed(1);
      let totalHits=this.holes.reduce((s,h)=>s+h.count,0);
      let exp=0;
      for(let h of this.holes){
        if(totalHits>0) exp+=h.score*(h.count/totalHits);
      }
      document.getElementById('statExpected').textContent=exp.toFixed(2);
    }
    this.updateHistogram();
    this.updateHoleStats();
  }

  // ============================================================
  // RENDER
  // ============================================================
  render(timestamp){
    this.renderFrame(timestamp);
    requestAnimationFrame((t)=>this.render(t));
  }

  renderFrame(timestamp){
    ctx.clearRect(0,0,W,H);

    // Background fill (outside board)
    ctx.fillStyle='#0a0a1a';
    ctx.fillRect(0,0,W,H);

    // Elliptical board
    let cx=this.boardCx,cy=this.boardCy,rx=this.boardRx,ry=this.boardRy;
    let cutY=this.boardCutoutY;
    ctx.save();
    let sa=Math.asin(Math.max(-1,Math.min(1,(cutY-cy)/ry)));
    let arcStart=Math.PI-sa, arcEnd=sa+2*Math.PI;

    // Clip to board shape and draw background image inside
    ctx.beginPath();
    ctx.ellipse(cx,cy,rx,ry,0,arcStart,arcEnd);
    ctx.closePath();
    ctx.clip();
    if(this.bgImage && this.bgImage.complete && this.bgImage.naturalWidth>0){
      let scale=Math.min(rx*2/this.bgImage.naturalWidth, ry*2/this.bgImage.naturalHeight)*1.1;
      let iw=this.bgImage.naturalWidth*scale;
      let ih=this.bgImage.naturalHeight*scale;
      ctx.drawImage(this.bgImage,cx-iw/2,cy-ih/2,iw,ih);
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.fillRect(0,0,W,H);
    } else {
      ctx.fillStyle='rgba(10,10,30,0.95)';
      ctx.fill();
    }
    ctx.restore();

    // Board border
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx,cy,rx,ry,0,arcStart,arcEnd);
    ctx.closePath();
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=30;
    ctx.strokeStyle='#8B4513';ctx.lineWidth=8;
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#A0522D';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(cx,cy,rx-6,ry-6,0,arcStart,arcEnd);ctx.stroke();
    // Subtle frame glow
    ctx.shadowColor='rgba(255,215,0,0.15)';
    ctx.shadowBlur=15;
    ctx.strokeStyle='rgba(255,215,0,0.1)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(cx,cy,rx+2,ry+2,0,arcStart,arcEnd);ctx.closePath();ctx.stroke();
    ctx.shadowBlur=0;
    ctx.restore();

    // Glowing frame during fever
    if(this.bigChanceMode){
      ctx.save();
      for(let g=0;g<4;g++){
        let hue=(this.rainbowHue+g*90)%360;
        ctx.beginPath();
        ctx.ellipse(cx,cy,rx+8+g*3,ry+8+g*3,0,arcStart,arcEnd);
        ctx.closePath();
        ctx.strokeStyle=`hsla(${hue},100%,60%,${0.4-g*0.08})`;
        ctx.lineWidth=6-g;
        ctx.shadowColor=`hsla(${hue},100%,60%,0.3)`;
        ctx.shadowBlur=20+g*10;
        ctx.stroke();
      }
      ctx.shadowBlur=0;
      ctx.restore();
    }

    // Glass overlay
    ctx.save();
    ctx.beginPath();ctx.ellipse(cx,cy,rx-10,ry-10,0,arcStart,arcEnd);ctx.closePath();
    ctx.fillStyle='rgba(200,220,255,0.04)';ctx.fill();
    ctx.restore();

    // Cutout bottom border
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(cx-rx-10,cutY-3,rx*2+20,6);

    // Walls
    ctx.strokeStyle='#8B4513';ctx.lineWidth=6;
    for(let w of this.walls){
      ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();
    }

    // Pins
    for(let p of this.pins){
      let grad=ctx.createRadialGradient(p.x-2,p.y-2,0,p.x,p.y,p.r);
      grad.addColorStop(0,'#c0c0c0');
      grad.addColorStop(0.5,'#888');
      grad.addColorStop(1,'#444');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#666';
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(p.x-2,p.y-2,p.r*0.4,0,Math.PI*2);
      ctx.fill();
    }

    // Obstacles
    for(let o of this.obstacles){
      ctx.fillStyle=o.color||'#ff6666';
      if(o.type==='circle'){
        ctx.beginPath();
        ctx.arc(o.x,o.y,o.r||15,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle='#ff3333';
        ctx.lineWidth=2;
        ctx.stroke();
      }else if(o.type==='tri'){
        ctx.beginPath();
        let s=o.r||15;
        ctx.moveTo(o.x,o.y-s);
        ctx.lineTo(o.x-s*0.866,o.y+s*0.5);
        ctx.lineTo(o.x+s*0.866,o.y+s*0.5);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle='#ff3333';
        ctx.lineWidth=2;
        ctx.stroke();
      }else if(o.type==='rect'){
        ctx.fillRect(o.x-(o.w||30)/2,o.y-(o.h||30)/2,o.w||30,o.h||30);
        ctx.strokeStyle='#ff3333';
        ctx.lineWidth=2;
        ctx.strokeRect(o.x-(o.w||30)/2,o.y-(o.h||30)/2,o.w||30,o.h||30);
      }
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.font='10px sans';
      ctx.textAlign='center';
      ctx.fillText('⬡',o.x,o.y+4);
    }

    // Holes
    for(let h of this.holes){
      let grad=ctx.createLinearGradient(h.x,h.y-h.h/2,h.x,h.y+h.h/2);
      grad.addColorStop(0,h.score>=100?'#ffd700':h.score>=50?'#ff8c00':h.score>=20?'#44aaff':h.score>=10?'#44ff44':'#888');
      grad.addColorStop(1,'#111');
      ctx.fillStyle=grad;
      ctx.fillRect(h.x-h.w/2,h.y-h.h/2,h.w,h.h);
      ctx.strokeStyle='#fff';
      ctx.lineWidth=1;
      ctx.strokeRect(h.x-h.w/2,h.y-h.h/2,h.w,h.h);
    }

    // Ball trails
    for(let b of this.balls){
      for(let i=0;i<b.trail.length;i++){
        let t=b.trail[i];
        let alpha=t.life*0.3;
        ctx.fillStyle=b.color+Math.floor(alpha*255).toString(16).padStart(2,'0');
        ctx.beginPath();
        ctx.arc(t.x,t.y,b.r*(0.2+0.8*t.life),0,Math.PI*2);
        ctx.fill();
      }
    }

    // Balls
    for(let b of this.balls){
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.arc(b.pos.x+2,b.pos.y+2,b.r,0,Math.PI*2);
      ctx.fill();
      let grad=ctx.createRadialGradient(b.pos.x-2,b.pos.y-2,0,b.pos.x,b.pos.y,b.r);
      grad.addColorStop(0,'#fff');
      grad.addColorStop(0.2,b.color);
      grad.addColorStop(1,'#000');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(b.pos.x,b.pos.y,b.r,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(b.pos.x-b.r*0.3,b.pos.y-b.r*0.3,b.r*0.35,0,Math.PI*2);
      ctx.fill();
    }

    // Particles
    for(let p of this.particles){
      let alpha=Math.max(0,p.life);
      ctx.fillStyle=p.color+Math.floor(alpha*255).toString(16).padStart(2,'0');
      ctx.beginPath();
      ctx.arc(p.pos.x,p.pos.y,p.size||3,0,Math.PI*2);
      ctx.fill();
    }

    // Launch indicator
    if(this.gameMode){
      let topY=Math.max(35,this.boardCy-this.boardRy+15);
      let angleRad=this.launchAngle*Math.PI/180;
      let ex=this.launchX+Math.sin(angleRad)*30;
      let ey=topY-Math.cos(angleRad)*30;
      ctx.strokeStyle='rgba(255,255,100,0.5)';
      ctx.lineWidth=2;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(this.launchX,topY);
      ctx.lineTo(ex,ey);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,255,100,0.3)';
      ctx.beginPath();
      ctx.arc(this.launchX,topY,8,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#ff0';
      ctx.font='10px sans';
      ctx.textAlign='center';
      ctx.fillText('▼',this.launchX,topY+5);
    }

    // ============================================================
    // SLOT MACHINE RENDERING (BOTTOM OF CANVAS)
    // ============================================================
    let slotY=748;
    let slotCX=400;

    // Slot background
    ctx.save();
    ctx.shadowColor='rgba(255,215,0,0.5)';ctx.shadowBlur=40;
    ctx.strokeStyle='rgba(255,215,0,0.15)';
    ctx.lineWidth=6;
    this.roundRect(ctx,slotCX-232,slotY-17,464,159,14);
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.shadowColor='rgba(255,215,0,0.3)';ctx.shadowBlur=30;
    let sg=ctx.createLinearGradient(slotCX-230,slotY-15,slotCX+230,slotY+155);
    sg.addColorStop(0,'#2a1a0a');
    sg.addColorStop(0.5,'#4a3020');
    sg.addColorStop(1,'#2a1a0a');
    ctx.fillStyle=sg;
    ctx.strokeStyle='#8B6914';
    ctx.lineWidth=4;
    this.roundRect(ctx,slotCX-230,slotY-15,460,155,12);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#6a4910';
    ctx.lineWidth=1;
    this.roundRect(ctx,slotCX-226,slotY-11,452,147,10);
    ctx.stroke();

    ctx.shadowColor='rgba(255,215,0,0.6)';
    ctx.shadowBlur=20;
    ctx.fillStyle='#ffd700';
    ctx.font='bold 18px sans';
    ctx.textAlign='center';
    ctx.textBaseline='top';
    ctx.fillText('🎰 SLOT',slotCX,slotY-10);
    ctx.shadowBlur=0;

    // Reels background glow
    ctx.shadowColor='rgba(255,215,0,0.3)';
    ctx.shadowBlur=20;
    ctx.strokeStyle='rgba(255,215,0,0.2)';
    ctx.lineWidth=2;
    this.roundRect(ctx,slotCX-175,slotY+18,350,85,6);
    ctx.stroke();
    ctx.shadowBlur=0;
    // Reels background
    ctx.fillStyle='#0a0a0a';
    ctx.strokeStyle='#555';
    ctx.lineWidth=3;
    this.roundRect(ctx,slotCX-175,slotY+18,350,85,6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle='rgba(255,215,0,0.03)';
    this.roundRect(ctx,slotCX-173,slotY+20,346,81,5);
    ctx.fill();

    // Reels
    let reelW=85, reelGap=14;
    let reelStartX=slotCX-((reelW*3+reelGap*2)/2)+reelW/2;
    for(let i=0;i<3;i++){
      let rx=reelStartX+i*(reelW+reelGap);
      let ry=slotY+22;
      let displayIdx;
      if(this.slotSpinning&&!this.slotReelStopped[i]){
        displayIdx=Math.abs(Math.floor(this.slotReelPos[i]))%SLOT_SYMBOLS.length;
      } else {
        displayIdx=this.slotReels[i];
      }
      let sym=SLOT_SYMBOLS[displayIdx]||SLOT_SYMBOLS[0];
      let isJackpotSym=displayIdx===6;

      ctx.fillStyle='rgba(0,0,0,0.4)';
      this.roundRect(ctx,rx-reelW/2+2,ry+2,reelW,77,4);
      ctx.fill();

      ctx.fillStyle='#1a1a1a';
      ctx.strokeStyle=isJackpotSym?'#ffd700':'#444';
      ctx.lineWidth=isJackpotSym?3:2;
      ctx.shadowColor=isJackpotSym?'rgba(255,215,0,0.6)':'transparent';
      ctx.shadowBlur=isJackpotSym?15:0;
      this.roundRect(ctx,rx-reelW/2,ry,reelW,77,4);
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur=0;

      if(this.slotSpinning&&!this.slotReelStopped[i]){
        let img=this.slotImages[displayIdx];
        if(img&&img.complete&&img.naturalWidth>0){
          ctx.save();
          ctx.beginPath();
          this.roundRect(ctx,rx-reelW/2+4,ry+4,reelW-8,69,3);
          ctx.clip();
          let iw=img.naturalWidth,ih=img.naturalHeight;
          let scale=Math.min((reelW-16)/iw,69/ih);
          let dw=iw*scale, dh=ih*scale;
          ctx.drawImage(img,rx-dw/2,ry+40-dh/2,dw,dh);
          ctx.restore();
        }
        ctx.fillStyle='rgba(255,255,255,0.04)';
        ctx.fillRect(rx-reelW/2,ry+10,reelW,4);
        ctx.fillRect(rx-reelW/2,ry+50,reelW,4);
      } else {
        let isWin=false;
        if(this.slotWinTimer>0&&this.slotWinAmount>0&&displayIdx===this.slotTarget[0]&&this.slotTarget[0]===this.slotTarget[1]&&this.slotTarget[1]===this.slotTarget[2]){
          isWin=true;
        }
        if(isJackpotSym){
          ctx.save();
          let hue=(performance.now()/6)%360;
          ctx.shadowColor=`hsla(${hue},100%,60%,0.8)`;
          ctx.shadowBlur=25+Math.sin(performance.now()/80)*8;
          ctx.strokeStyle=`hsla(${hue},100%,60%,0.6)`;
          ctx.lineWidth=4;
          this.roundRect(ctx,rx-reelW/2-3,ry-3,reelW+6,83,6);
          ctx.stroke();
          ctx.shadowBlur=0;
          ctx.strokeStyle=`hsla(${hue},100%,70%,0.3)`;
          ctx.lineWidth=2;
          this.roundRect(ctx,rx-reelW/2-6,ry-6,reelW+12,89,8);
          ctx.stroke();
          ctx.restore();
        }
        let img=this.slotImages[displayIdx];
        if(img&&img.complete&&img.naturalWidth>0){
          ctx.save();
          ctx.beginPath();
          this.roundRect(ctx,rx-reelW/2+4,ry+4,reelW-8,69,3);
          ctx.clip();
          let iw=img.naturalWidth,ih=img.naturalHeight;
          let scale=Math.min((reelW-16)/iw,69/ih);
          let dw=iw*scale, dh=ih*scale;
          ctx.drawImage(img,rx-dw/2,ry+40-dh/2,dw,dh);
          ctx.restore();
        }
        if(isWin){
          ctx.strokeStyle='#ffd700';
          ctx.lineWidth=3;
          ctx.shadowColor='rgba(255,215,0,0.6)';
          ctx.shadowBlur=12;
          this.roundRect(ctx,rx-reelW/2-2,ry-2,reelW+4,81,5);
          ctx.stroke();
          ctx.shadowBlur=0;
        }
      }
    }

    // Payline markers
    ctx.strokeStyle='rgba(255,215,0,0.2)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,6]);
    let lineY=slotY+60;
    ctx.beginPath();ctx.moveTo(slotCX-185,lineY);ctx.lineTo(slotCX-150,lineY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(slotCX+150,lineY);ctx.lineTo(slotCX+185,lineY);ctx.stroke();
    ctx.setLineDash([]);

    // Big lamps
    let lampY=slotY-38;
    for(let i=0;i<this.maxLamps;i++){
      let lx=slotCX-120+i*80;
      ctx.beginPath();
      ctx.arc(lx,lampY,18,0,Math.PI*2);
      if(this.lampStates[i]){
        if(this.bigChanceMode){
          let hue=(this.rainbowHue+i*60)%360;
          let lg=ctx.createRadialGradient(lx-4,lampY-4,0,lx,lampY,18);
          lg.addColorStop(0,`hsl(${hue},100%,80%)`);
          lg.addColorStop(0.3,`hsl(${hue},100%,50%)`);
          lg.addColorStop(1,`hsl(${hue},100%,20%)`);
          ctx.fillStyle=lg;
          ctx.shadowColor=`hsl(${hue},100%,60%)`;
          ctx.shadowBlur=70;
        } else {
          let lg=ctx.createRadialGradient(lx-4,lampY-4,0,lx,lampY,18);
          lg.addColorStop(0,'#ffaaaa');
          lg.addColorStop(0.3,'#ff2222');
          lg.addColorStop(1,'#660000');
          ctx.fillStyle=lg;
          ctx.shadowColor='#ff4444';
          ctx.shadowBlur=60;
        }
      } else {
        ctx.fillStyle='#222';
        ctx.shadowBlur=0;
      }
      ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='#777';
      ctx.lineWidth=3;
      ctx.stroke();
      // Glint on top of lit lamp
      if(this.lampStates[i]){
        ctx.fillStyle='rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.arc(lx-5,lampY-6,6,0,Math.PI*2);
        ctx.fill();
      }
    }

    // Win text
    if(this.slotWinTimer>0&&this.slotWinText){
      ctx.fillStyle='#ffd700';
      ctx.font='bold 28px sans';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.shadowColor='rgba(255,215,0,0.6)';
      ctx.shadowBlur=15;
      ctx.fillText('🎉 '+this.slotWinText+' 🎉',slotCX,slotY+170);
      ctx.shadowBlur=0;
    }

    ctx.restore();

    // ============================================================
    // MONEY DISPLAY (RIGHT OF SLOT)
    // ============================================================
    let mdX=slotCX+238;
    let mdY=slotY+10;
    let mdW=148;
    let mdH=128;
    let totalSpent=this.ballsUsed*this.pricePerBall;
    let totalWon=this.totalBallsWon*this.pricePerBall;
    let profit=totalWon-totalSpent;
    let isFlashing=this._profitFlashTimer>0;

    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.strokeStyle=isFlashing?'#ffd700':'#555';
    ctx.lineWidth=isFlashing?3:1;
    if(isFlashing){
      ctx.shadowColor='rgba(255,215,0,0.6)';
      ctx.shadowBlur=20;
    }
    this.roundRect(ctx,mdX,mdY,mdW,mdH,8);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur=0;

    ctx.font='bold 12px sans';
    ctx.textAlign='center';
    ctx.textBaseline='top';
    ctx.fillStyle='#ffd700';
    ctx.fillText('💰 収支',mdX+mdW/2,mdY+6);

    ctx.font='bold 26px sans';
    if(isFlashing){
      let hue=(performance.now()/8)%360;
      ctx.fillStyle=`hsl(${hue},100%,60%)`;
      ctx.shadowColor=`hsla(${hue},100%,60%,0.8)`;
      ctx.shadowBlur=20+Math.sin(performance.now()/60)*10;
    }else{
      ctx.fillStyle=profit>=0?'#ffd700':'#ff4444';
      ctx.shadowBlur=0;
    }
    ctx.fillText((profit>=0?'+':'')+profit.toLocaleString()+'円',mdX+mdW/2,mdY+34);
    ctx.shadowBlur=0;

    ctx.fillStyle='#44aaff';
    ctx.font='10px sans';
    ctx.fillText('所持金',mdX+mdW/2,mdY+68);
    ctx.font='bold 15px sans';
    ctx.fillText(this.money.toLocaleString()+'円',mdX+mdW/2,mdY+83);

    ctx.fillStyle='#8af';
    ctx.font='9px sans';
    ctx.fillText('玉: '+this.ballsOwned,mdX+mdW/2,mdY+103);

    ctx.fillStyle='#aaa';
    ctx.font='8px sans';
    ctx.fillText('使用玉: '+this.ballsUsed,mdX+mdW/2,mdY+117);
    ctx.restore();

    // Money/status bar
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,30);
    if(this.gameMode){
      ctx.fillStyle='rgba(0,255,100,0.6)';
      ctx.font='bold 12px sans';
      ctx.textAlign='left';
      let feverText=this.bigChanceMode?` 🔥FEVER ${Math.ceil(this.feverTimer)}s`:``;
      let totalSpent=this.ballsUsed*this.pricePerBall;
      let totalWon=this.totalBallsWon*this.pricePerBall;
      let profit=totalWon-totalSpent;
      ctx.fillText(`💰${this.money}円 | 🏐${this.ballsOwned}玉 | 📊${profit>=0?'+':''}${profit}円 | 💡${this.lampsLit}/4${feverText}`,15,19);
    }else{
      ctx.fillStyle='rgba(255,200,0,0.6)';
      ctx.font='11px sans';
      ctx.textAlign='left';
      ctx.fillText(`🔧 EDIT | Tool: ${this.tool} | Mode: ${this.placeMode} | Pins: ${this.pins.length}`,15,19);
    }

    // FPS
    if(this.showFps){
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(W-70,5,65,20);
      ctx.fillStyle='#0f0';
      ctx.font='11px monospace';
      ctx.textAlign='right';
      ctx.fillText(`FPS:${this.fps}`,W-10,19);
    }

    // Debug
    if(this.debugMode){
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.fillRect(10,40,200,120);
      ctx.fillStyle='#0f0';
      ctx.font='10px monospace';
      ctx.textAlign='left';
      let i=0;
      for(let k of ['balls','pins','holes','score','money','ballsOwned']){
        ctx.fillText(`${k}: ${this[k].length||this[k]}`,20,55+i*14);
        i++;
      }
    }

    // FEVER big text overlay
    if(this.bigChanceMode){
      ctx.save();
      let hue=(this.rainbowHue*2)%360;
      ctx.shadowColor=`hsla(${hue},100%,60%,0.8)`;
      ctx.shadowBlur=50+Math.sin(performance.now()/150)*25;
      ctx.font='bold 80px sans';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.strokeStyle=`hsla(${hue},100%,30%,0.6)`;
      ctx.lineWidth=6;
      ctx.strokeText('F  E  V  E  R',W/2,200);
      ctx.fillStyle=`hsl(${hue},100%,70%)`;
      ctx.fillText('F  E  V  E  R',W/2,200);
      ctx.fillStyle=`hsl(${(hue+180)%360},100%,60%)`;
      ctx.shadowBlur=30+Math.sin(performance.now()/200)*15;
      ctx.fillText('F  E  V  E  R',W/2-3,200);
      ctx.shadowBlur=0;
      ctx.restore();
    }

    // Combo display
    if(this.combo>1){
      ctx.fillStyle='#ffd700';
      ctx.font='bold 24px sans';
      ctx.textAlign='center';
      ctx.fillText(`${this.combo}x COMBO!`,W/2,70);
    }
  }

  roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  // ============================================================
  // MONEY DISPLAY
  // ============================================================
  updateMoneyDisplay(){
    let totalValue=(this.ballsOwned+this.ballsUsed)*this.pricePerBall;
    let totalSpent=this.ballsUsed*this.pricePerBall;
    let totalWonValue=this.totalBallsWon*this.pricePerBall;
    let profit=totalWonValue-totalSpent;
    document.getElementById('moneyDisplay').textContent=this.money.toLocaleString()+'円';
    document.getElementById('ballsDisplay').textContent=this.ballsOwned;
    document.getElementById('usedBallsDisplay').textContent=this.ballsUsed;
    document.getElementById('totalValueDisplay').textContent=totalValue.toLocaleString()+'円';
    let profitEl=document.getElementById('profitDisplay');
    profitEl.textContent=(profit>=0?'+':'')+profit.toLocaleString()+'円';
    profitEl.style.color=profit>=0?'#ffd700':'#ff4444';
    if(profit>this._prevProfit){
      this._profitFlashTimer=2;
      profitEl.style.animation='none';
      profitEl.offsetHeight;
      profitEl.style.animation='profitFlash 0.5s ease 3';
    }
    this._prevProfit=profit;
  }

  updateSlotUI(){
    document.getElementById('spinBtn').disabled=this.lampsLit<this.maxLamps||this.slotSpinning;
    let probsDiv=document.getElementById('symbolProbs');
    let html='';
    let totalW=this.symbolWeights.reduce((a,b)=>a+b,0);
    for(let i=0;i<SLOT_SYMBOLS.length;i++){
      let pct=((this.symbolWeights[i]/totalW)*100).toFixed(1);
      let img=this.slotImages[i];
      let thumb=img&&img.complete&&img.naturalWidth>0?`<img src="${SLOT_SYMBOLS[i].imgSrc}" style="width:20px;height:20px;vertical-align:middle;border-radius:2px">`:'';
      html+=`<div style="display:flex;align-items:center;gap:4px">
        ${thumb}<span style="font-size:11px">${SLOT_SYMBOLS[i].name}</span>
        <input type="number" id="weight_${i}" value="${this.symbolWeights[i]}" min="1" max="100" style="width:40px;background:#222;border:1px solid #555;color:#e0e0e0;padding:1px 2px;border-radius:3px;font-size:10px">
        <span style="color:#8af;font-size:10px">${pct}%</span>
      </div>`;
    }
    probsDiv.innerHTML=html;
    for(let i=0;i<SLOT_SYMBOLS.length;i++){
      let inp=document.getElementById('weight_'+i);
      if(inp) inp.addEventListener('change',()=>{
        let v=parseInt(inp.value)||1;
        if(v<1)v=1;if(v>100)v=100;
        this.symbolWeights[i]=v;
        inp.value=v;
        this.updateSlotUI();
      });
    }
    let payoutsDiv=document.getElementById('symbolPayouts');
    let payHtml='';
    for(let i=0;i<SLOT_SYMBOLS.length;i++){
      let base=this.symbolPayouts[i];
      let img=this.slotImages[i];
      let thumb=img&&img.complete&&img.naturalWidth>0?`<img src="${SLOT_SYMBOLS[i].imgSrc}" style="width:20px;height:20px;vertical-align:middle;border-radius:2px">`:'';
      payHtml+=`<div style="display:flex;align-items:center;gap:4px">
        ${thumb}<span style="font-size:11px">${SLOT_SYMBOLS[i].name}</span>
        <input type="number" id="payout_${i}" value="${base}" min="1" max="999" style="width:50px;background:#222;border:1px solid #555;color:#e0e0e0;padding:1px 2px;border-radius:3px;font-size:10px">
        <span style="font-size:10px">玉</span>
      </div>`;
    }
    payoutsDiv.innerHTML=payHtml;
    for(let i=0;i<SLOT_SYMBOLS.length;i++){
      let inp=document.getElementById('payout_'+i);
      if(inp) inp.addEventListener('change',()=>{
        let v=parseInt(inp.value)||1;
        if(v<1)v=1;if(v>999)v=999;
        this.symbolPayouts[i]=v;
        inp.value=v;
      });
    }
  }

  // ============================================================
  // UI SETUP
  // ============================================================
  setupUI(){
    // Gravity
    document.getElementById('gravity').addEventListener('input',e=>{
      this.gravity=+e.target.value;
      document.getElementById('gravityVal').textContent=e.target.value;
    });
    document.getElementById('gravityPreset').addEventListener('change',e=>{
      if(e.target.value){
        let v=+e.target.value;
        document.getElementById('gravity').value=v;
        this.gravity=v;
        document.getElementById('gravityVal').textContent=v;
      }
    });
    document.getElementById('restitution').addEventListener('input',e=>{
      this.restitution=e.target.value/100;

    document.addEventListener('keydown',(e)=>{

        // Enter / B key / middle click simulation for fever slot spin
        if((e.key==='Enter'||e.key==='b'||e.key==='B')&&this.lampsLit>=this.maxLamps&&!this.slotSpinning){
          e.preventDefault();
          this.triggerFeverSpin();
          return;

        if((e.key==='a'||e.key==='A'||e.key==='b'||e.key==='B'||e.key===' ')&&!this.dropIntervalId){

            if(!this.gameMode){this.stopDropInterval();return;}
            this.fireBall(this.launchX,60);

        }
      }
      if(e.key==='z'&&(e.ctrlKey||e.metaKey)) {e.preventDefault();this.undo();}
      if(e.key==='y'&&(e.ctrlKey||e.metaKey)) {e.preventDefault();this.redo();}

    });
    document.addEventListener('keyup',(e)=>{
      if(this.gameMode&&this.dropIntervalId&&(e.key==='a'||e.key==='A'||e.key==='b'||e.key==='B'||e.key===' ')){
        this.stopDropInterval();
      }
    });

    this.updateLampUI();
    this.updateSlotUI();

  // ============================================================
  // MOUSE
  // ============================================================
  onMouseDown(e){
    let rect=canvas.getBoundingClientRect();
    let x=e.clientX-rect.left, y=e.clientY-rect.top;
    x*=canvas.width/rect.width;
    y*=canvas.height/rect.height;

    if(this.gameMode){
      if(e.button===0&&!this.dropIntervalId){
        this.fireBall(x,60);
        this.dropIntervalId=setInterval(()=>{
          if(!this.gameMode){this.stopDropInterval();return;}
          this.fireBall(this.launchX,60);
        },this.dropIntervalMs);
      }
      return;
    }

    // Edit mode
    this.saveUndo();

    if(this.tool==='pin'){
      if(this.placeMode==='free'){
        this.addPin(x,y);
      }else if(this.placeMode==='grid'){
        let gs=40;
        let gx=Math.round(x/gs)*gs, gy=Math.round(y/gs)*gs;
        this.addPin(gx,gy);
      }else if(this.placeMode==='circle'){
        let cx=x, cy=y, r=60;
        for(let i=0;i<8;i++){
          let a=(i/8)*Math.PI*2;
          this.addPin(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
      }else if(this.placeMode==='random'){
        for(let i=0;i<20;i++){
          let px=x+(Math.random()-0.5)*120;
          let py=y+(Math.random()-0.5)*120;
          if(px>30&&px<W-30&&py>40&&py<H-40) this.addPin(px,py);
        }
      }
    }else if(this.tool==='wall'){
      let half=40;
      let a=this.wallAngle*Math.PI/180;
      this.walls.push({x1:x-Math.cos(a)*half,y1:y-Math.sin(a)*half,x2:x+Math.cos(a)*half,y2:y+Math.sin(a)*half,type:'wall'});
    }else if(this.tool==='hole'){
      this.holes.push({x,y,w:50,h:6,score:10,id:this.holes.length,count:0,total:0});
    }else if(this.tool==='obstacle'){
      this.obstacles.push({x,y,r:15,type:'circle',color:'#ff6666'});
    }else if(this.tool==='eraser'){
      let closest=null, minDist=20;
      for(let p of this.pins){
        let d=Math.sqrt((x-p.x)**2+(y-p.y)**2);
        if(d<minDist){minDist=d;closest=p;}
      }
      if(closest) this.pins=this.pins.filter(p=>p!==closest);
      for(let o of this.obstacles){
        let d=Math.sqrt((x-o.x)**2+(y-o.y)**2);
        if(d<20){this.obstacles=this.obstacles.filter(ob=>ob!==o);break;}
      }
    }

    // Drag existing pin
    for(let p of this.pins){
      if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<15){
        this.draggingBody=p;
        this.dragOffset=new Vec(x-p.x,y-p.y);
        break;
      }
    }
  }

  onMouseMove(e){
    let rect=canvas.getBoundingClientRect();
    let x=e.clientX-rect.left, y=e.clientY-rect.top;
    x*=canvas.width/rect.width;
    y*=canvas.height/rect.height;

    if(this.draggingBody){
      this.draggingBody.x=x-this.dragOffset.x;
      this.draggingBody.y=y-this.dragOffset.y;
    }
  }

  onMouseUp(e){
    this.draggingBody=null;
    if(this.gameMode&&this.dropIntervalId) this.stopDropInterval();
  }

  stopDropInterval(){
    if(this.dropIntervalId){clearInterval(this.dropIntervalId);this.dropIntervalId=null;}
  }

  startGame(){

  }

  stopGame(){
    this.gameMode=false;
    this.stopAutoFire();
    this.stopDropInterval();
    this.balls=[];
    this.particles=[];
    document.getElementById('mode-label').textContent='🔧 編集モード';
    document.getElementById('btnStart').textContent='▶ ゲームスタート';
    document.getElementById('editTools').classList.remove('hidden');
  }

  // ============================================================
  // SOUND
  // ============================================================
  setupSound(){
    this.audioCtx=null;
    try{this.audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
    this.bgmPlaying=false;
    this.bgmAudio=null;
    this.pickRandomBGM();
  }

  pickRandomBGM(){
    try{
      let pick=this.bgmTracks[Math.floor(Math.random()*this.bgmTracks.length)];
      this.bgmAudio=new Audio(pick);
      this.bgmAudio.loop=true;
      this.bgmAudio.volume=this.volume*0.3;
    }catch(e){}
  }

  switchBGM(src){
    let wasPlaying=this.bgmPlaying;
    this.stopBGM();
    try{
      this.bgmAudio=new Audio(src);
      this.bgmAudio.loop=true;
      this.bgmAudio.volume=this.volume*0.3;
      if(wasPlaying){
        this.bgmAudio.play().catch(()=>{});
        this.bgmPlaying=true;
      }
    }catch(e){}
  }

  startBGM(){
    this.pickRandomBGM();
    if(!this.bgmAudio)return;
    this.bgmAudio.currentTime=0;
    this.bgmAudio.play().catch(()=>{});
    this.bgmPlaying=true;
  }

  stopBGM(){
    if(!this.bgmPlaying||!this.bgmAudio)return;
    this.bgmAudio.pause();
    this.bgmAudio.currentTime=0;
    this.bgmPlaying=false;
  }

  playSound(type){
    if(!this.audioCtx||this.volume<=0) return;
    if(!this._lastSound) this._lastSound={};
    let now=performance.now();
    let minGap={launch:80,pin:30,wall:60,score:200};
    if(now-(this._lastSound[type]||0)<(minGap[type]||50)) return;
    this._lastSound[type]=now;
    try{
      let osc=this.audioCtx.createOscillator();
      let gain=this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      let vol=type==='pin'?0.08:type==='wall'?0.06:0.12;
      gain.gain.value=this.volume*vol;
      if(type==='launch'){
        osc.frequency.setValueAtTime(400,this.audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800,this.audioCtx.currentTime+0.08);
        gain.gain.exponentialRampToValueAtTime(0.001,this.audioCtx.currentTime+0.12);
        osc.start();osc.stop(this.audioCtx.currentTime+0.12);
      }else if(type==='pin'){
        osc.type='sine';
        osc.frequency.setValueAtTime(800+Math.random()*400,this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,this.audioCtx.currentTime+0.04);
        osc.start();osc.stop(this.audioCtx.currentTime+0.04);
      }else if(type==='wall'){
        osc.type='sine';
        osc.frequency.setValueAtTime(300,this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,this.audioCtx.currentTime+0.06);
        osc.start();osc.stop(this.audioCtx.currentTime+0.06);
      }else if(type==='score'){
        osc.type='sine';
        osc.frequency.setValueAtTime(523,this.audioCtx.currentTime);
        osc.frequency.setValueAtTime(659,this.audioCtx.currentTime+0.08);
        osc.frequency.setValueAtTime(784,this.audioCtx.currentTime+0.16);
        gain.gain.exponentialRampToValueAtTime(0.001,this.audioCtx.currentTime+0.25);
        osc.start();osc.stop(this.audioCtx.currentTime+0.25);
      }
    }catch(e){}
  }

  // ============================================================
  // PARTICLES
  // ============================================================
  spawnParticles(x,y,color,n=10){
    for(let i=0;i<n;i++){
      let angle=Math.random()*Math.PI*2;
      let speed=Math.random()*100+20;
      this.particles.push({
        pos:new Vec(x,y),
        vel:new Vec(Math.cos(angle)*speed,Math.sin(angle)*speed),
        life:1,
        color,
        size:Math.random()*3+1
      });
    }
  }

  showScorePopup(x,y,score){
    this.spawnParticles(x,y,'#ffd700',15);
  }

  // ============================================================
  // UNDO / REDO
  // ============================================================
  saveUndo(){
    this.undoStack.push({
      pins:JSON.parse(JSON.stringify(this.pins)),
      holes:JSON.parse(JSON.stringify(this.holes.map(h=>({...h,count:0,total:0})))),
      obstacles:JSON.parse(JSON.stringify(this.obstacles)),
      walls:JSON.parse(JSON.stringify(this.walls))
    });
    if(this.undoStack.length>50) this.undoStack.shift();
    this.redoStack=[];
  }

  undo(){
    if(this.undoStack.length===0) return;
    this.redoStack.push({
      pins:JSON.parse(JSON.stringify(this.pins)),
      holes:JSON.parse(JSON.stringify(this.holes.map(h=>({...h,count:0,total:0})))),
      obstacles:JSON.parse(JSON.stringify(this.obstacles)),
      walls:JSON.parse(JSON.stringify(this.walls))
    });
    let state=this.undoStack.pop();
    this.pins=state.pins;
    this.holes=state.holes;
    this.obstacles=state.obstacles;
    if(state.walls) this.walls=state.walls;
  }

  redo(){
    if(this.redoStack.length===0) return;
    this.undoStack.push({
      pins:JSON.parse(JSON.stringify(this.pins)),
      holes:JSON.parse(JSON.stringify(this.holes.map(h=>({...h,count:0,total:0})))),
      obstacles:JSON.parse(JSON.stringify(this.obstacles)),
      walls:JSON.parse(JSON.stringify(this.walls))
    });
    let state=this.redoStack.pop();
    this.pins=state.pins;
    this.holes=state.holes;
    this.obstacles=state.obstacles;
    if(state.walls) this.walls=state.walls;
  }

  // ============================================================
  // SAVE / LOAD
  // ============================================================
  save(){
    let data={pins:this.pins,holes:this.holes,obstacles:this.obstacles,walls:this.walls,gravity:this.gravity};
    localStorage.setItem('pachinko_save',JSON.stringify(data));
    let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='pachinko_data.json';
    a.click();
    URL.revokeObjectURL(a.href);
    this.toast('保存しました (localStorage + ファイル出力)');
  }

  load(){
    let inp=document.createElement('input');
    inp.type='file';
    inp.accept='.json';
    inp.onchange=(e)=>{
      let file=e.target.files[0];
      if(!file)return;
      let reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          let d=JSON.parse(ev.target.result);
          this.pins=d.pins||this.pins;
          this.holes=d.holes||this.holes;
          this.obstacles=d.obstacles||this.obstacles;
          this.walls=d.walls||this.walls;
          if(d.gravity){
            this.gravity=d.gravity;
            document.getElementById('gravity').value=d.gravity;
            document.getElementById('gravityVal').textContent=d.gravity;
          }
          localStorage.setItem('pachinko_save',JSON.stringify(d));
          this.toast('ファイルから読み込みました');
        }catch(e){this.toast('ファイル読み込みエラー');}
      };
      reader.readAsText(file);
    };
    inp.click();
  }

  // ============================================================
  // STATISTICS
  // ============================================================
  updateHistogram(){
    let container=document.getElementById('histogram');
    if(this.scores.length===0){
      container.innerHTML='<div style="color:#666;font-size:11px">データがありません</div>';
      return;
    }

    if(this.chartType==='histogram'){
      let maxScore=Math.max(...this.scores,1);
      let buckets=10;
      let bucketSize=Math.ceil(maxScore/buckets)||1;
      let counts=new Array(buckets).fill(0);
      for(let s of this.scores){
        let idx=Math.min(Math.floor(s/bucketSize),buckets-1);
        counts[idx]++;
      }
      let maxCount=Math.max(...counts,1);
      let html='';
      for(let i=0;i<buckets;i++){
        let low=i*bucketSize, high=(i+1)*bucketSize-1;
        let pct=(counts[i]/maxCount)*100;
        html+=`<div class="chart-row"><span style="width:50px">${low}-${high}</span><div class="chart-bar" style="width:${pct}%;background:${this.getColor(i/buckets)}"></div><span>${counts[i]}</span></div>`;
      }
      container.innerHTML=html;
    }else if(this.chartType==='pie'){
      let buckets=8;
      let maxScore=Math.max(...this.scores,1);
      let bucketSize=Math.ceil(maxScore/buckets)||1;
      let counts=new Array(buckets).fill(0);
      for(let s of this.scores){
        let idx=Math.min(Math.floor(s/bucketSize),buckets-1);
        counts[idx]++;
      }
      let total=this.scores.length;
      let html='<div style="display:flex;flex-wrap:wrap;gap:6px">';
      for(let i=0;i<buckets;i++){
        if(counts[i]===0) continue;
        let pct=((counts[i]/total)*100).toFixed(1);
        html+=`<div style="display:flex;align-items:center;gap:4px;font-size:10px">
          <div style="width:10px;height:10px;border-radius:50%;background:${this.getColor(i/buckets)}"></div>
          ${i*bucketSize}-${(i+1)*bucketSize-1}: ${pct}%</div>`;
      }
      html+='</div>';
      container.innerHTML=html;
    }else if(this.chartType==='heatmap'){
      let cells=8;
      let maxScore=Math.max(...this.scores,1);
      let cellSize=Math.ceil(maxScore/cells)||1;
      let counts=new Array(cells).fill(0);
      for(let s of this.scores){
        let idx=Math.min(Math.floor(s/cellSize),cells-1);
        counts[idx]++;
      }
      let maxCount=Math.max(...counts,1);
      let html='<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px">';
      for(let i=0;i<cells;i++){
        let intensity=counts[i]/maxCount;
        let r=Math.floor(255*intensity);
        let b=Math.floor(255*(1-intensity));
        html+=`<div style="aspect-ratio:1;background:rgb(${r},0,${b});border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff">
          ${counts[i]}</div>`;
      }
      html+='</div>';
      container.innerHTML=html;
    }
  }

  getColor(t){
    let r=Math.floor(255*t);
    let b=Math.floor(255*(1-t));
    return `rgb(${r},0,${b})`;
  }

  updateHoleStats(){
    let el=document.getElementById('holeStats');
    let html='';
    for(let h of this.holes){
      if(h.count>0){
        html+=`<div class="stat-row"><span>穴#${h.id} (${h.score}pt):</span><span>${h.count}個 (計${h.total}pt)</span></div>`;
      }
    }
    el.innerHTML=html;
  }

  // ============================================================
  // GAME LOOP
  // ============================================================
  gameLoop(timestamp){
    let dt=(timestamp-this.prevTime)/1000;
    if(dt>0.1) dt=0.016;
    this.prevTime=timestamp;

    this.fpsCount++;
    this.fpsTime+=dt;
    if(this.fpsTime>=1){
      this.fps=this.fpsCount;
      this.fpsCount=0;
      this.fpsTime=0;
    }

    this.update(dt);
    requestAnimationFrame((t)=>this.gameLoop(t));
  }

  // ============================================================
  // TOAST
  // ============================================================
  toast(msg){
    let el=document.getElementById('toast');
    el.textContent=msg;
    el.style.opacity=1;
    clearTimeout(this._toastTimer);
    this._toastTimer=setTimeout(()=>el.style.opacity=0,2500);
  }
}

// ============================================================
// START
// ============================================================
const game=new Pachinko();
</script>
