<script>
const audioBtn = document.getElementById("audioBtn");
const bgmAudio = document.getElementById("bgmAudio");
let isPlaying = false;

audioBtn.onclick = () => {
  if(isPlaying){
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    isPlaying = false;
    audioBtn.textContent = "🎵 BGMを再生";
  } else {
    bgmAudio.play().catch(()=>{});
    isPlaying = true;
    audioBtn.textContent = "⏹ BGM停止";
  }
};

// ページ読み込み時点でブラウザキャッシュへの取り込みをさらに確実にするため
// fetch APIでも全ファイルをキャッシュに先読み
const allSounds = [
  "bo/jajan.mp3","bo/bgm.mp3","bo/oto.mp3","bo/seikai.mp3","bo/d.mp3",
  "dora/jajan.mp3","dora/bgm.mp3","dora/oto.mp3","dora/seikai.mp3","dora/d.mp3",
  "doubutu/jajan.mp3","doubutu/bgm.mp3","doubutu/oto.mp3","doubutu/seikai.mp3","doubutu/d.mp3","doubutu/cat.mp3",
  "pika/jajan.mp3","pika/bgm.mp3","pika/oto.mp3","pika/seikai.mp3","pika/d.mp3",
  "wood/jajan.mp3","wood/bgm.mp3","wood/oto.mp3","wood/seikai.mp3","wood/d.mp3",
  "nannnenn/jajan.mp3","nannnenn/bgm.mp3","nannnenn/oto.mp3","nannnenn/seikai.mp3","nannnenn/d.mp3",
  "semi/jajan.mp3","semi/bgm.mp3","semi/oto.mp3","semi/seikai.mp3","semi/d.mp3",
  "tyuou/jajan.mp3","tyuou/bgm.mp3","tyuou/oto.mp3","tyuou/seikai.mp3","tyuou/d.mp3",
  "kame/jajan.mp3","kame/bgm.mp3","kame/oto.mp3","kame/seikai.mp3","kame/d.mp3"
];

// fetch でブラウザキャッシュに先読みしておく
allSounds.forEach(src => {
  fetch(src).catch(() => {});
});

// ボタン押下時：全音声を無音で一瞬再生してブラウザのAutoplay制限を解除
function unlockAllSounds() {
  document.querySelectorAll("audio.preload").forEach(el => {
    el.volume = 0;
    el.currentTime = 0;
    el.play().then(() => {
      el.pause();
      el.currentTime = 0;
      el.volume = 1;
    }).catch(() => {
      el.volume = 1;
    });
  });
}

document.getElementById("startBtn").onclick = () => {
  unlockAllSounds();
  location.href = "bo/s1.html";
};
</script>
